<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FitTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --cream:#faf8f3;--white:#fff;
  --s50:#f8f7f4;--s100:#f0ede6;--s200:#e2ddd4;--s300:#c8c0b0;--s400:#a89880;
  --forest:#1a3a2a;--fmid:#2d5a3d;--flight:#4a8a5d;
  --sage:#7aaa8a;--sagel:#b8d4c0;--sagep:#e8f4ec;
  --gold:#c8882a;--goldl:#f0c870;--goldp:#fdf5e4;
  --coral:#d45a3a;--coralp:#fdf0ec;
  --sky:#2a7aaa;--skyp:#e4f2fb;
  --purple:#7c3aed;--purplep:#f5f0ff;
  --text:#1a1510;--text2:#3d3020;--muted:#7a6a55;--faint:#a89880;
  --r:18px;--sh:0 2px 16px rgba(26,20,10,0.08);--shl:0 8px 40px rgba(26,20,10,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--cream);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* AUTH */
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#0f2018,#1a3a2a 40%,#2d5a3d);padding:24px;}
.ac{background:#fff;border-radius:32px;padding:44px 38px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,0.3);}
.alogo{font-family:‘Playfair Display’,serif;font-size:40px;font-weight:900;color:var(–forest);letter-spacing:-2px;margin-bottom:4px;}
.alogo span{color:var(–flight);}
.asub{font-size:13px;color:var(–muted);margin-bottom:30px;}
.atabs{display:flex;background:var(–s100);border-radius:12px;padding:4px;margin-bottom:26px;}
.atab{flex:1;padding:10px;background:none;border:none;border-radius:9px;font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:600;cursor:pointer;color:var(–muted);transition:all .2s;}
.atab.active{background:#fff;color:var(–forest);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.afield{margin-bottom:14px;}
.albl{display:block;font-size:11px;font-weight:700;color:var(–muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;font-family:‘Space Grotesk’,sans-serif;}
.ainp{width:100%;padding:13px 15px;background:var(–s50);border:1.5px solid var(–s200);border-radius:12px;font-family:‘DM Sans’,sans-serif;font-size:15px;color:var(–text);transition:border-color .2s,box-shadow .2s;}
.ainp:focus{outline:none;border-color:var(–flight);box-shadow:0 0 0 3px rgba(74,138,93,.15);}
.abtn{width:100%;padding:15px;background:linear-gradient(135deg,var(–fmid),var(–forest));border:none;border-radius:14px;font-family:‘DM Sans’,sans-serif;font-size:16px;font-weight:700;color:#fff;cursor:pointer;margin-top:8px;box-shadow:0 6px 24px rgba(26,58,42,.35);transition:transform .15s;}
.abtn:active{transform:scale(.98);}
.aerr{background:var(–coralp);border:1px solid rgba(212,90,58,.3);border-radius:10px;padding:11px 13px;font-size:13px;color:var(–coral);margin-bottom:12px;display:none;}
.amsg{background:var(–sagep);border:1px solid rgba(74,138,93,.3);border-radius:10px;padding:11px 13px;font-size:13px;color:var(–flight);margin-bottom:12px;display:none;}

/* APP */
#app{display:none;}
.header{background:linear-gradient(135deg,var(–forest),var(–fmid));padding:28px 22px 0;position:relative;overflow:hidden;}
.header::before{content:’’;position:absolute;top:-80px;right:-80px;width:240px;height:240px;background:radial-gradient(circle,rgba(255,255,255,.06),transparent 70%);pointer-events:none;}
.header::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(–sage),var(–goldl),var(–sage));}
.htop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.hlogo{font-family:‘Playfair Display’,serif;font-size:12px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px;}
.hweight{font-family:‘Playfair Display’,serif;font-size:44px;font-weight:900;color:#fff;letter-spacing:-2px;line-height:1;}
.hweight span{font-size:15px;font-weight:400;color:rgba(255,255,255,.5);margin-left:3px;font-family:‘DM Sans’,sans-serif;}
.hsub{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px;}
.hpill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:12px 15px;text-align:right;backdrop-filter:blur(8px);}
.hpilll{font-size:8px;font-weight:700;letter-spacing:2px;color:var(–sagel);text-transform:uppercase;font-family:‘Space Grotesk’,sans-serif;}
.hpillv{font-family:‘Playfair Display’,serif;font-size:26px;font-weight:900;color:#fff;}
.hpilld{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px;}
.pbar{height:6px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden;margin-bottom:15px;}
.pfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(–sage),var(–goldl));transition:width .8s cubic-bezier(.4,0,.2,1);}
.hctrl{display:flex;gap:8px;align-items:center;padding-bottom:15px;}
.dpill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;padding:8px 13px;font-size:13px;font-weight:500;font-family:‘DM Sans’,sans-serif;}
.tbtn{background:rgba(122,170,138,.3);border:1px solid rgba(122,170,138,.5);border-radius:10px;color:var(–sagel);padding:8px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:‘DM Sans’,sans-serif;}
.sobtn{margin-left:auto;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:rgba(255,255,255,.5);padding:7px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:‘DM Sans’,sans-serif;}
.husr{font-size:11px;color:rgba(255,255,255,.45);font-weight:500;}

/* NAV */
.nav{position:fixed;bottom:0;left:0;width:100%;background:rgba(255,255,255,.97);border-top:1px solid var(–s200);padding:8px 4px 20px;display:flex;gap:2px;z-index:100;backdrop-filter:blur(20px);box-shadow:0 -4px 24px rgba(26,20,10,.08);}
.nbtn{flex:1;padding:7px 2px;background:none;border:1px solid transparent;border-radius:11px;color:var(–faint);font-size:6.5px;letter-spacing:1px;cursor:pointer;font-family:‘Space Grotesk’,sans-serif;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s;text-transform:uppercase;}
.nbtn.active{background:var(–sagep);border-color:rgba(74,138,93,.3);color:var(–flight);}
.nbtn .icon{font-size:17px;}

/* TABS */
.tab{display:none;padding:20px 18px 0;animation:su .22s ease;}
.tab.active{display:block;}
@keyframes su{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* CARDS */
.card{background:#fff;border-radius:var(–r);padding:18px;border:1px solid var(–s200);margin-bottom:12px;box-shadow:var(–sh);}
.cg{border-left:4px solid var(–flight);background:linear-gradient(135deg,var(–sagep),#fff);}
.cgd{border-left:4px solid var(–gold);background:linear-gradient(135deg,var(–goldp),#fff);}
.csk{border-left:4px solid var(–sky);background:linear-gradient(135deg,var(–skyp),#fff);}
.cco{border-left:4px solid var(–coral);background:linear-gradient(135deg,var(–coralp),#fff);}
.cpu{border-left:4px solid var(–purple);background:linear-gradient(135deg,var(–purplep),#fff);}

/* TYPE */
.lbl{font-family:‘Space Grotesk’,sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(–muted);margin-bottom:10px;display:block;}
.lbl.g{color:var(–flight);}.lbl.gd{color:var(–gold);}.lbl.sk{color:var(–sky);}.lbl.co{color:var(–coral);}.lbl.pu{color:var(–purple);}
.snum{font-family:‘Playfair Display’,serif;font-size:34px;font-weight:900;color:var(–text);line-height:1;}

/* INPUTS */
.inp{background:var(–s50);border:1.5px solid var(–s200);border-radius:12px;padding:11px 13px;color:var(–text);font-size:14px;width:100%;font-family:‘DM Sans’,sans-serif;transition:border-color .2s,box-shadow .2s;}
.inp:focus{outline:none;border-color:var(–flight);box-shadow:0 0 0 3px rgba(74,138,93,.12);}
select.inp{cursor:pointer;}

/* BUTTONS */
.btn{background:linear-gradient(135deg,var(–fmid),var(–forest));border:none;border-radius:12px;color:#fff;padding:12px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:‘DM Sans’,sans-serif;box-shadow:0 4px 16px rgba(26,58,42,.25);transition:transform .15s;}
.btn:active{transform:scale(.97);}
.bgd{background:linear-gradient(135deg,#e0a040,var(–gold));box-shadow:0 4px 16px rgba(200,136,42,.3);}
.bsk{background:linear-gradient(135deg,#3a9acc,var(–sky));box-shadow:0 4px 16px rgba(42,122,170,.3);}
.bco{background:linear-gradient(135deg,#e06a4a,var(–coral));box-shadow:0 4px 16px rgba(212,90,58,.3);}
.bgh{background:var(–s100);color:var(–text2);box-shadow:none;border:1.5px solid var(–s200);}
.bsm{padding:8px 13px;font-size:12px;border-radius:10px;}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}

/* SEGMENTS */
.seg{display:flex;background:var(–s100);border-radius:14px;padding:4px;margin-bottom:16px;border:1px solid var(–s200);}
.sb{flex:1;padding:10px 4px;background:none;border:none;border-radius:10px;color:var(–muted);font-size:10px;letter-spacing:2px;cursor:pointer;font-family:‘Space Grotesk’,sans-serif;font-weight:700;text-transform:uppercase;transition:all .2s;}
.sb.active{background:#fff;color:var(–forest);box-shadow:0 2px 8px rgba(0,0,0,.08);}

/* FOOD */
.frow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(–s100);}
.frow:last-child{border-bottom:none;}
.sr{background:#fff;border:1.5px solid var(–s200);border-radius:14px;margin-top:6px;max-height:280px;overflow-y:auto;box-shadow:var(–shl);display:none;position:relative;z-index:50;}
.sri{padding:12px 15px;cursor:pointer;border-bottom:1px solid var(–s100);display:flex;justify-content:space-between;align-items:center;transition:background .15s;}
.sri:hover,.sri:active{background:var(–sagep);}
.sri:last-child{border-bottom:none;}
.meal-item{background:var(–s50);border-radius:12px;padding:10px 13px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(–s200);}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.chip{padding:8px 13px;border-radius:999px;border:1.5px solid var(–s200);background:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:‘DM Sans’,sans-serif;color:var(–text2);}
.chip.sel{background:var(–forest);border-color:var(–forest);color:#fff;}
.chip.sel-gd{background:var(–gold);border-color:var(–gold);color:#fff;}
.chip.sel-sk{background:var(–sky);border-color:var(–sky);color:#fff;}
.chip.sel-co{background:var(–coral);border-color:var(–coral);color:#fff;}
.chip.sel-pu{background:var(–purple);border-color:var(–purple);color:#fff;}

/* TOGGLES */
.ri{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(–s100);}
.tgl{width:46px;height:25px;background:var(–s200);border-radius:999px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0;}
.tgl.on{background:var(–flight);}
.tgl::after{content:’’;position:absolute;top:3px;left:3px;width:19px;height:19px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 2px 4px rgba(0,0,0,.15);}
.tgl.on::after{transform:translateX(21px);}

/* MISC */
.rings{display:flex;justify-content:space-around;padding:8px 0;}
.aitip{background:linear-gradient(135deg,#f5f2ff,#f0f8ff);border:1.5px solid rgba(122,100,200,.2);border-radius:var(–r);padding:16px;margin-bottom:12px;}
.prb{background:linear-gradient(135deg,var(–gold),#a06820);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:1px;font-family:‘Space Grotesk’,sans-serif;}
.rmb{background:none;border:none;color:var(–faint);cursor:pointer;font-size:20px;line-height:1;padding:0 4px;transition:color .2s;}
.rmb:active{color:var(–coral);}
.cbox{background:var(–sagep);border-radius:14px;padding:13px;border-left:4px solid var(–flight);margin-top:10px;}
.spin{width:32px;height:32px;border:3px solid var(–s200);border-top-color:var(–flight);border-radius:50%;animation:sp .8s linear infinite;margin:30px auto;display:block;}
@keyframes sp{to{transform:rotate(360deg);}}
svg.exsvg{background:var(–sagep);border-radius:12px;display:block;width:100%;}

/* RESPONSIVE */
@media(min-width:768px){
body{padding-left:220px;padding-bottom:0;}
.nav{left:0;top:0;bottom:0;width:220px;height:100vh;flex-direction:column;justify-content:flex-start;padding:28px 12px 28px;border-top:none;border-right:1px solid var(–s200);gap:5px;overflow-y:auto;box-shadow:2px 0 20px rgba(26,20,10,.06);}
.nav::before{content:‘FitTrack’;display:block;font-family:‘Playfair Display’,serif;font-size:22px;font-weight:900;color:var(–forest);padding:0 12px 20px;border-bottom:2px solid var(–sagep);margin-bottom:14px;width:100%;}
.nbtn{flex:none;flex-direction:row;justify-content:flex-start;padding:12px 15px;font-size:11px;letter-spacing:1.5px;gap:12px;border-radius:12px;width:100%;}
.nbtn .icon{font-size:19px;}
.header{padding:32px 44px 0;}
.tab{padding:24px 44px 0;max-width:960px;}
.g2{gap:16px;}.g3{gap:12px;}
}
@media(min-width:1024px){
body{padding-left:240px;}
.nav{width:240px;}
.tab{max-width:1000px;padding:28px 52px 0;}
.header{padding:34px 52px 0;}
}
</style>

</head>
<body>

<!-- AUTH SCREEN -->

<div id="auth">
  <div class="ac">
    <div class="alogo">Fit<span>Track</span></div>
    <div class="asub">Your personal fitness & nutrition companion</div>
    <div class="atabs">
      <button class="atab active" onclick="switchTab('login')">Sign In</button>
      <button class="atab" onclick="switchTab('signup')">Create Account</button>
    </div>
    <div class="aerr" id="aerr"></div>
    <div class="amsg" id="amsg"></div>
    <div id="lform">
      <div class="afield"><label class="albl">Email</label><input class="ainp" type="email" id="lem" placeholder="you@email.com" autocomplete="email"></div>
      <div class="afield"><label class="albl">Password</label><input class="ainp" type="password" id="lpw" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()"></div>
      <button class="abtn" onclick="doSignIn()">Sign In →</button>
    </div>
    <div id="sform" style="display:none;">
      <div class="afield"><label class="albl">Your Name</label><input class="ainp" type="text" id="snm" placeholder="Matthew"></div>
      <div class="afield"><label class="albl">Email</label><input class="ainp" type="email" id="sem" placeholder="you@email.com" autocomplete="email"></div>
      <div class="afield"><label class="albl">Password</label><input class="ainp" type="password" id="spw" placeholder="Min 6 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignUp()"></div>
      <button class="abtn" onclick="doSignUp()">Create Account →</button>
      <div style="text-align:center;font-size:12px;color:var(--faint);margin-top:14px;">Private · syncs across all your devices</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->

<div id="app">
  <div class="header">
    <div class="htop">
      <div>
        <div class="hlogo">FitTrack</div>
        <div class="hweight" id="hw">180<span>lbs</span></div>
        <div class="hsub" id="hl">Start: 180 lbs</div>
      </div>
      <div class="hpill">
        <div class="hpilll">Goal</div>
        <div class="hpillv" id="hg">170</div>
        <div class="hpilld" id="hd">-- days left</div>
      </div>
    </div>
    <div class="pbar"><div class="pfill" id="hp" style="width:0%"></div></div>
    <div class="hctrl">
      <input type="date" id="sd" class="dpill">
      <button class="tbtn" onclick="goToday()">TODAY</button>
      <span class="husr" id="husr"></span>
      <button class="sobtn" onclick="doSignOut()">Sign Out</button>
    </div>
  </div>

  <div class="tab active" id="t-home"></div>
  <div class="tab" id="t-food"></div>
  <div class="tab" id="t-lift"></div>
  <div class="tab" id="t-weight"></div>
  <div class="tab" id="t-stats"></div>
  <div class="tab" id="t-diet"></div>
  <div class="tab" id="t-goals"></div>

  <nav class="nav">
    <button class="nbtn active" onclick="showTab('home',this)"><span class="icon">⚡</span><span>Home</span></button>
    <button class="nbtn" onclick="showTab('food',this)"><span class="icon">🍽️</span><span>Food</span></button>
    <button class="nbtn" onclick="showTab('lift',this)"><span class="icon">💪</span><span>Lift</span></button>
    <button class="nbtn" onclick="showTab('weight',this)"><span class="icon">⚖️</span><span>Weight</span></button>
    <button class="nbtn" onclick="showTab('stats',this)"><span class="icon">📈</span><span>Stats</span></button>
    <button class="nbtn" onclick="showTab('diet',this)"><span class="icon">🌿</span><span>Diet</span></button>
    <button class="nbtn" onclick="showTab('goals',this)"><span class="icon">⚙️</span><span>Goals</span></button>
  </nav>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────
const SB_URL='https://ljerxeimfpnxiwdjcywn.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqZXJ4ZWltZnBueGl3ZGpjeXduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTQ5OTMsImV4cCI6MjA4ODU5MDk5M30.EayWkGMKVnjpwHwE3QGyVKHXJBZIkOCC3RhRV7gBc9c';
const sb=supabase.createClient(SB_URL,SB_KEY);
let USER=null;

// ── AUTH ──────────────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll('.atab').forEach((b,i)=>b.classList.toggle('active',i===(t==='login'?0:1)));
  document.getElementById('lform').style.display=t==='login'?'block':'none';
  document.getElementById('sform').style.display=t==='signup'?'block':'none';
  hideMsg();
}
function showErr(m){const e=document.getElementById('aerr');e.textContent=m;e.style.display='block';document.getElementById('amsg').style.display='none';}
function showMsg(m){const e=document.getElementById('amsg');e.textContent=m;e.style.display='block';document.getElementById('aerr').style.display='none';}
function hideMsg(){document.getElementById('aerr').style.display='none';document.getElementById('amsg').style.display='none';}

async function doSignIn(){
  const email=document.getElementById('lem').value.trim();
  const pw=document.getElementById('lpw').value;
  if(!email||!pw){showErr('Please fill in all fields.');return;}
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){showErr(error.message);return;}
  USER=data.user;await loadAll();launch();
}
async function doSignUp(){
  const name=document.getElementById('snm').value.trim();
  const email=document.getElementById('sem').value.trim();
  const pw=document.getElementById('spw').value;
  if(!name){showErr('Please enter your name.');return;}
  if(!email){showErr('Please enter your email.');return;}
  if(!pw){showErr('Please enter a password.');return;}
  if(pw.length<6){showErr('Password needs at least 6 characters.');return;}
  const btn=document.querySelector('#sform .abtn');
  btn.textContent='Creating account...';btn.disabled=true;
  try{
    const{data,error}=await sb.auth.signUp({email,password:pw,options:{data:{name}}});
    if(error){showErr(error.message);btn.textContent='Create Account →';btn.disabled=false;return;}
    if(data&&data.user){
      USER=data.user;
      S={...DS,name};
      await saveAll();
      launch();
    } else {
      showMsg('Account created! Check your email to confirm, then sign in.');
      btn.textContent='Create Account →';btn.disabled=false;
    }
  }catch(e){
    showErr('Something went wrong: '+e.message);
    btn.textContent='Create Account →';btn.disabled=false;
  }
}
async function doSignOut(){await sb.auth.signOut();USER=null;document.getElementById('app').style.display='none';document.getElementById('auth').style.display='flex';}
sb.auth.getSession().then(({data:{session}})=>{if(session){USER=session.user;loadAll().then(launch);}});

// ── CLOUD ─────────────────────────────────────────────────────
async function cSave(k,v){if(!USER)return;try{await sb.from('user_data').upsert({user_id:USER.id,key:k,value:JSON.stringify(v)},{onConflict:'user_id,key'});}catch(e){console.warn(e);}}
async function cLoad(k,d){if(!USER)return d;try{const{data}=await sb.from('user_data').select('value').eq('user_id',USER.id).eq('key',k).single();return data?JSON.parse(data.value):d;}catch{return d;}}
async function saveAll(){
  try{await Promise.all([cSave('s',S),cSave('l',L),cSave('w',W),cSave('sc',SC),cSave('pr',PR),cSave('bm',BM),cSave('rx',RX)]);}
  catch(e){console.warn('saveAll error:',e);}
}
async function loadAll(){[S,L,W,SC,PR,BM,RX]=await Promise.all([cLoad('s',{...DS}),cLoad('l',{}),cLoad('w',{}),cLoad('sc',{}),cLoad('pr',{}),cLoad('bm',{h:70,a:30,sx:'male'}),cLoad('rx',{...DRX})]);}
async function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}await cSave(k,v);}

// ── HELPERS ───────────────────────────────────────────────────
const td=()=>new Date().toISOString().split('T')[0];
const dow=()=>new Date().getDay();
const dSince=d=>Math.max(0,Math.round((new Date()-new Date(d))/864e5));
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function goToday(){selD=td();document.getElementById('sd').value=selD;render();}
function getDL(){return L[selD]||{breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};}
function allFood(){const d=getDL();return[...(d.breakfast||[]),...(d.lunch||[]),...(d.dinner||[]),...(d.snacks||[])];}
function totals(){return allFood().reduce((a,f)=>({cal:a.cal+f.cal,p:a.p+(f.protein||0),c:a.c+(f.carbs||0),f:a.f+(f.fat||0)}),{cal:0,p:0,c:0,f:0});}
function curW(){const e=Object.entries(W).sort().reverse()[0];return e?e[1]:(S.startW||180);}
function prog(){const sw=S.startW||180,gw=S.goalW||170,lost=sw-curW(),rng=Math.abs(sw-gw)||10;return Math.min(100,Math.max(0,(lost/rng)*100));}
function dLeft(){const gd=S.goalD||'2026-05-06',sd=S.startD||'2026-03-03';return Math.max(0,Math.round((new Date(gd)-new Date(sd))/864e5)-dSince(sd));}

async function addItem(sec,item){if(!L[selD])L[selD]={breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};L[selD][sec]=[...(L[selD][sec]||[]),item];await sv('l',L);render();}
async function rmItem(sec,id){if(!L[selD])return;L[selD][sec]=(L[selD][sec]||[]).filter(f=>f.id!==id);await sv('l',L);render();}
async function addWk(n){if(!n)return;if(!L[selD])L[selD]={breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};L[selD].workouts=[...(L[selD].workouts||[]),{name:n,id:Date.now()}];await sv('l',L);render();}
async function rmWk(id){if(!L[selD])return;L[selD].workouts=(L[selD].workouts||[]).filter(w=>w.id!==id);await sv('l',L);render();}
async function logW(v){if(!v)return;W[selD]=parseFloat(v);await sv('w',W);render();}
async function rmW(d){delete W[d];await sv('w',W);render();}
async function savePR(ex,wt,rp){PR[ex]={weight:parseFloat(wt),reps:parseInt(rp),date:selD};await sv('pr',PR);render();}
async function saveBM(h,a,sx){BM={h:parseFloat(h)||70,a:parseInt(a)||30,sx:sx||'male'};await sv('bm',BM);render();}
async function saveRX(r){RX={...RX,...r};await sv('rx',RX);render();}
async function saveS(s){S={...S,...s};await sv('s',S);render();}

function banned(){
  const b=[];
  if(RX.gluten)b.push('gluten');if(RX.dairy)b.push('dairy');if(RX.nuts)b.push('nuts');
  if(RX.shellfish)b.push('shellfish');if(RX.eggs)b.push('eggs');if(RX.soy)b.push('soy');
  if(RX.nightshades)b.push('nightshade');
  if(RX.vegetarian||RX.vegan)b.push('meat');
  if(RX.vegan){b.push('dairy');b.push('eggs');}
  return b;
}
function searchFood(q,max=12){
  if(!q||q.length<2)return[];
  const ql=q.toLowerCase().trim(),ws=ql.split(/\s+/),bn=banned();
  return FDB.filter(f=>!f.t.some(t=>bn.includes(t)))
    .map(f=>{const n=f.n.toLowerCase();let s=0;
      if(n===ql)s=100;else if(n.startsWith(ql))s=80;
      else if(ws.every(w=>n.includes(w)))s=60;else if(ws.some(w=>n.includes(w)))s=35;
      else if(f.t.some(t=>t.includes(ql)))s=10;
      return{...f,s};})
    .filter(f=>f.s>0).sort((a,b)=>b.s-a.s).slice(0,max);
}

  const hr=new Date().getHours(),sec=hr<11?'breakfast':hr<15?'lunch':hr<21?'dinner':'snacks';

  else{addItem(sec,{name:raw.slice(0,50),cal:0,protein:0,carbs:0,fat:0,emoji:'🍽️',id:Date.now()});}

// ── FOOD ──────────────────────────────────────────────────────
function renderFood(){

  const d=getDL(),t=totals(),CAL=S.cal||2000;
  const secs=[{k:'breakfast',l:'Breakfast',i:'🌅',c:'var(--gold)'},{k:'lunch',l:'Lunch',i:'☀️',c:'var(--sky)'},{k:'dinner',l:'Dinner',i:'🌙',c:'var(--flight)'},{k:'snacks',l:'Snacks',i:'🍎',c:'var(--coral)'}];
  const bar=`<div style="display:flex;gap:8px;margin-bottom:14px;">
    <button onclick="foodMode='log';renderFood();" style="flex:1;padding:10px;background:${foodMode==='log'?'linear-gradient(135deg,var(--fmid),var(--forest))':'var(--s100)'};border:1.5px solid ${foodMode==='log'?'var(--forest)':'var(--s200)'};border-radius:12px;color:${foodMode==='log'?'#fff':'var(--text2)'};font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;">📋 Food Log</button>
    <button onclick="foodMode='builder';renderFood();" style="flex:1;padding:10px;background:${foodMode==='builder'?'linear-gradient(135deg,var(--fmid),var(--forest))':'var(--s100)'};border:1.5px solid ${foodMode==='builder'?'var(--forest)':'var(--s200)'};border-radius:12px;color:${foodMode==='builder'?'#fff':'var(--text2)'};font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;">🧩 Meal Builder</button>
  </div>`;
  const html=secs.map(s=>{
    const items=d[s.k]||[],secCal=items.reduce((a,f)=>a+f.cal,0);
    const rows=items.map(f=>`<div class="meal-item"><div><div style="font-size:13px;font-weight:600;">${f.emoji||'🍽️'} ${esc(f.name)}</div><div style="font-size:11px;color:var(--muted);">${f.cal} cal · P${f.protein||0}g · C${f.carbs||0}g · F${f.fat||0}g</div></div><button class="rmb" onclick="rmItem('${s.k}','${f.id}')">×</button></div>`).join('');
    return `<div style="margin-bottom:18px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:7px;"><span style="font-size:15px;">${s.i}</span><span style="font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:${s.c};">${s.l.toUpperCase()}</span></div>
        ${items.length?`<span style="font-size:11px;color:var(--muted);">${secCal} cal</span>`:''}
      </div>
      ${rows}
      <div style="position:relative;margin-top:4px;">
        <input class="inp" id="fi-${s.k}" placeholder="Search any food..." oninput="showSR('${s.k}')" onkeydown="if(event.key==='Enter')addFirst('${s.k}')">
        <div class="sr" id="sr-${s.k}"></div>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=bar+html+`<div class="card cgd"><div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;"><span>Today's Total</span><span style="color:${t.cal>CAL?'var(--coral)':'var(--gold)'};">${t.cal} / ${CAL} cal</span></div></div>`;
}

function showSR(sec){
  const inp=document.getElementById('fi-'+sec),res=document.getElementById('sr-'+sec);
  if(!inp||!res)return;const q=inp.value.trim();
  if(q.length<2){res.style.display='none';return;}
  const found=searchFood(q);
  if(!found.length){res.style.display='none';return;}
  res.innerHTML=found.map(f=>`<div class="sri" onclick="doAddFood('${sec}','${esc(f.n)}',${f.cal},${f.p},${f.c},${f.f},'${f.e}')">
    <div><div style="font-size:13px;font-weight:600;">${f.e} ${f.n}</div><div style="font-size:11px;color:var(--muted);">P${f.p}g · C${f.c}g · F${f.f}g</div></div>
    <div style="font-size:15px;font-weight:800;color:var(--gold)">${f.cal}</div>
  </div>`).join('');
  res.style.display='block';
}
function addFirst(sec){const inp=document.getElementById('fi-'+sec);if(!inp)return;const f=searchFood(inp.value.trim(),1)[0];if(f)doAddFood(sec,f.n,f.cal,f.p,f.c,f.f,f.e);}
function doAddFood(sec,name,cal,p,c,f,e){
  addItem(sec,{name,cal:+cal,protein:+p,carbs:+c,fat:+f,emoji:e,id:Date.now()});
  const inp=document.getElementById('fi-'+sec),res=document.getElementById('sr-'+sec);
  if(inp)inp.value='';if(res)res.style.display='none';

// ── MEAL BUILDER ──────────────────────────────────────────────
function renderBuilder(el){
  let tcal=0,tp=0,tc=0,tf=0;
  ['base','protein','veggie','fruit'].forEach(k=>{if(MB_sel[k]){tcal+=MB_sel[k].cal;tp+=MB_sel[k].p;tc+=MB_sel[k].c;tf+=MB_sel[k].f;}});

  const bar=`<div style="display:flex;gap:8px;margin-bottom:14px;">
    <button onclick="foodMode='log';renderFood();" style="flex:1;padding:10px;background:var(--s100);border:1.5px solid var(--s200);border-radius:12px;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;">📋 Food Log</button>

  </div>`;

  const catHtml=Object.entries(MCAT).map(([key,cat])=>{
    const isMulti=key==='extras';
    const chips=cat.items.map(item=>{
      const isSel=isMulti?(MB_sel.extras||[]).some(e=>e.n===item.n):(MB_sel[key]&&MB_sel[key].n===item.n);
      return `<div class="chip${isSel?' sel':''}" onclick="toggleMB('${key}','${esc(item.n)}',${item.cal},${item.p},${item.c},${item.f},'${item.e}',${isMulti})" style="${isSel?'background:'+cat.color+';border-color:'+cat.color+';color:#fff':''}">
        ${item.e} ${item.n} <span style="font-size:11px;opacity:.75;">${item.cal}cal</span>

      </div>
      <div class="chips">${chips}</div>
    </div>`;
  }).join('');

  const hasSel=MB_sel.base||MB_sel.protein||MB_sel.veggie||MB_sel.fruit;
  const summary=hasSel?`<div class="card cg" style="margin-bottom:12px;">
    <span class="lbl g">YOUR MEAL TOTAL</span>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <div><div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:900;">${tcal}</div><div style="font-size:11px;color:var(--muted);">calories</div></div>
      <div style="display:flex;gap:12px;">
        <div style="text-align:center;"><div style="font-size:18px;font-weight:800;color:var(--flight);">${tp}g</div><div style="font-size:9px;color:var(--muted);">PROTEIN</div></div>
        <div style="text-align:center;"><div style="font-size:18px;font-weight:800;color:var(--sky);">${tc}g</div><div style="font-size:9px;color:var(--muted);">CARBS</div></div>
        <div style="text-align:center;"><div style="font-size:18px;font-weight:800;color:var(--purple);">${tf}g</div><div style="font-size:9px;color:var(--muted);">FAT</div></div>
      </div>
    </div>
    <div style="margin-top:14px;display:flex;gap:8px;">
      <button class="btn bsm" style="flex:1;" onclick="logBuilderMeal()">+ Log This Meal</button>
      <button class="btn bgh bsm" onclick="clearBuilder()">Clear</button>
    </div>
  </div>`:'';

  el.innerHTML=bar+summary+catHtml;
}

function toggleMB(cat,name,cal,p,c,f,e,isMulti){
  const item={n:name,cal,p,c,f,e};
  if(isMulti){
    const idx=(MB_sel.extras||[]).findIndex(x=>x.n===name);
    if(idx>=0)MB_sel.extras.splice(idx,1);else MB_sel.extras=[...(MB_sel.extras||[]),item];
  }else{
    MB_sel[cat]=(MB_sel[cat]&&MB_sel[cat].n===name)?null:item;
  }
  renderFood();
}
function clearBuilder(){MB_sel={base:null,protein:null,veggie:null,fruit:null,extras:[]};renderFood();}
async function logBuilderMeal(){
  const hr=new Date().getHours(),sec=hr<11?'breakfast':hr<15?'lunch':hr<21?'dinner':'snacks';
  const parts=[];
  ['base','protein','veggie','fruit'].forEach(k=>{if(MB_sel[k])parts.push(MB_sel[k].n);});
  (MB_sel.extras||[]).forEach(x=>parts.push(x.n));
  let tcal=0,tp=0,tc=0,tf=0;
  ['base','protein','veggie','fruit'].forEach(k=>{if(MB_sel[k]){tcal+=MB_sel[k].cal;tp+=MB_sel[k].p;tc+=MB_sel[k].c;tf+=MB_sel[k].f;}});
  (MB_sel.extras||[]).forEach(x=>{tcal+=x.cal;tp+=x.p;tc+=x.c;tf+=x.f;});
  const name=parts.slice(0,3).join(' + ')+(parts.length>3?' + more':'');
  await addItem(sec,{name,cal:tcal,protein:tp,carbs:tc,fat:tf,emoji:'🥣',id:Date.now()});
  clearBuilder();foodMode='log';renderFood();
}

// ── STATS ─────────────────────────────────────────────────────
function renderStats(){
  const el=document.getElementById('t-stats');
  const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d.toISOString().split('T')[0];});
  const calBars=last7.map(d=>{const day=L[d]||{};const foods=[...(day.breakfast||[]),...(day.lunch||[]),...(day.dinner||[]),...(day.snacks||[])];const cal=foods.reduce((a,f)=>a+f.cal,0);const CAL=S.cal||2000;const pct=Math.min(100,Math.round(cal/CAL*100));return{d,cal,pct};});
  const proBars=last7.map(d=>{const day=L[d]||{};const foods=[...(day.breakfast||[]),...(day.lunch||[]),...(day.dinner||[]),...(day.snacks||[])];const pro=foods.reduce((a,f)=>a+(f.protein||0),0);const PRO=S.pro||170;return{d,pro,pct:Math.min(100,Math.round(pro/PRO*100))};});
  const wkDots=last7.map(d=>{const day=L[d]||{};const done=(day.workouts||[]).length>0;return`<div style="width:32px;height:32px;border-radius:50%;background:${done?'var(--flight)':'var(--s200)'};display:flex;align-items:center;justify-content:center;font-size:14px;">${done?'✅':''}</div>`;}).join('');
  const streak=()=>{let s=0,d=new Date();while(true){const k=d.toISOString().split('T')[0];const dl=L[k]||{};if((dl.workouts||[]).length>0){s++;}else break;d.setDate(d.getDate()-1);}return s;};

  // BMR
  const bmr=BM.sx==='male'?10*curW()/2.205+6.25*BM.h*2.54-5*BM.a+5:10*curW()/2.205+6.25*BM.h*2.54-5*BM.a-161;
  const tdee=Math.round(bmr*1.55);const def=tdee-(S.cal||2000);const pace=(def*7/3500).toFixed(2);

  el.innerHTML=`
  <div class="g2">
    <div class="card cg" style="padding:14px;"><span class="lbl g">STREAK</span><div class="snum">${streak()}</div><div style="font-size:11px;color:var(--muted);">days in a row</div></div>
    <div class="card cgd" style="padding:14px;"><span class="lbl gd">PROGRESS</span><div class="snum">${prog().toFixed(0)}%</div><div style="font-size:11px;color:var(--muted);">to goal</div></div>
  </div>
  <div class="card" style="margin-bottom:12px;"><span class="lbl sk">7-DAY CALORIES</span>
    <div style="display:flex;align-items:flex-end;gap:4px;height:60px;margin-bottom:4px;">
      ${calBars.map(b=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
        <div style="width:100%;height:${Math.max(3,b.pct*0.54)}px;background:${b.d===selD?'var(--gold)':'var(--goldl)'};border-radius:4px 4px 0 0;transition:height .6s;"></div>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:4px;">${last7.map(d=>`<div style="flex:1;text-align:center;font-size:7px;color:var(--faint);">${d.slice(8)}</div>`).join('')}</div>
  </div>
  <div class="card" style="margin-bottom:12px;"><span class="lbl g">7-DAY PROTEIN</span>
    <div style="display:flex;align-items:flex-end;gap:4px;height:60px;margin-bottom:4px;">
      ${proBars.map(b=>`<div style="flex:1;height:${Math.max(3,b.pct*0.54)}px;background:${b.d===selD?'var(--flight)':'var(--sagel)'};border-radius:4px 4px 0 0;transition:height .6s;"></div>`).join('')}
    </div>
    <div style="display:flex;gap:4px;">${last7.map(d=>`<div style="flex:1;text-align:center;font-size:7px;color:var(--faint);">${d.slice(8)}</div>`).join('')}</div>
  </div>
  <div class="card" style="margin-bottom:12px;"><span class="lbl pu">WORKOUT WEEK</span><div style="display:flex;justify-content:space-between;margin-top:4px;">${wkDots}</div></div>
  <div class="card cpu">
    <span class="lbl pu">BODY METRICS</span>
    <div class="g3" style="margin-bottom:10px;">
      <div><input class="inp" id="bh" type="number" value="${BM.h}" placeholder="Height (in)"></div>
      <div><input class="inp" id="ba" type="number" value="${BM.a}" placeholder="Age"></div>
      <div><select class="inp" id="bsx"><option value="male" ${BM.sx==='male'?'selected':''}>Male</option><option value="female" ${BM.sx==='female'?'selected':''}>Female</option></select></div>
    </div>
    <button class="btn bsm" onclick="saveBM(document.getElementById('bh').value,document.getElementById('ba').value,document.getElementById('bsx').value)">Update</button>
    <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
      <div class="card" style="flex:1;min-width:100px;padding:12px;text-align:center;"><div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:900;">${Math.round(bmr)}</div><div style="font-size:10px;color:var(--muted);">BMR (cal/day)</div></div>
      <div class="card" style="flex:1;min-width:100px;padding:12px;text-align:center;"><div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:900;">${tdee}</div><div style="font-size:10px;color:var(--muted);">TDEE (cal/day)</div></div>
      <div class="card" style="flex:1;min-width:100px;padding:12px;text-align:center;"><div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:${def>0?'var(--flight)':'var(--coral)'};">${def>0?'-':''}${Math.abs(def)}</div><div style="font-size:10px;color:var(--muted);">Daily Deficit</div></div>
    </div>
    <div class="card cgd" style="padding:14px;text-align:center;margin-top:4px;"><div style="font-size:11px;color:var(--muted);margin-bottom:4px;">Projected fat loss</div><div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--gold);">${pace} lbs/week</div></div>
  </div>`;
}

// ── DIET ──────────────────────────────────────────────────────
function renderDiet(){
  const el=document.getElementById('t-diet');
  const items=[
    {key:'gluten',label:'Gluten Free',desc:'Avoids wheat, barley, rye, oats'},
    {key:'dairy',label:'Dairy Free',desc:'Avoids milk, cheese, yogurt, butter'},
    {key:'nuts',label:'Nut Allergy',desc:'Avoids all tree nuts and peanuts'},
    {key:'shellfish',label:'Shellfish Allergy',desc:'Avoids shrimp, crab, lobster, scallops'},
    {key:'eggs',label:'Egg Free',desc:'Avoids eggs and egg products'},
    {key:'soy',label:'Soy Free',desc:'Avoids soy, tofu, tempeh, edamame'},
    {key:'nightshades',label:'No Nightshades',desc:'Avoids tomatoes, peppers, eggplant, potatoes'},
    {key:'vegetarian',label:'Vegetarian',desc:'Avoids all meat and poultry'},
    {key:'vegan',label:'Vegan',desc:'No animal products whatsoever'},
  ];
  const activeCount=items.filter(i=>RX[i.key]).length;
  el.innerHTML=`
  <div class="card cg" style="margin-bottom:14px;">
    <span class="lbl g">DIETARY RESTRICTIONS</span>
    <div style="font-size:13px;color:var(--text2);line-height:1.6;">These filters apply across your <strong>food search</strong> and <strong>meal builder</strong>. Anything that conflicts with your restrictions will be hidden automatically.</div>
    ${activeCount?`<div style="margin-top:10px;background:var(--sagep);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--flight);font-weight:600;">${activeCount} restriction${activeCount>1?'s':''} active</div>`:''}
  </div>
  <div class="card" style="margin-bottom:12px;">
    <span class="lbl">RESTRICTIONS</span>
    ${items.map(item=>`<div class="ri">
      <div>
        <div style="font-size:14px;font-weight:600;">${item.label}</div>
        <div style="font-size:11px;color:var(--muted);">${item.desc}</div>
      </div>
      <button class="tgl ${RX[item.key]?'on':''}" onclick="saveRX({${item.key}:${!RX[item.key]}})"></button>
    </div>`).join('')}
  </div>
  <div class="card" style="margin-bottom:12px;">
    <span class="lbl co">ADDITIONAL NOTES</span>
    <textarea class="inp" rows="3" placeholder="Other allergies or notes (e.g. low sodium, no spicy food...)" style="resize:none;" oninput="saveRX({custom:this.value})">${RX.custom||''}</textarea>

  </div>
  <div class="card cpu">
    <span class="lbl pu">WHAT HAPPENS WHEN ACTIVE</span>
    <div style="font-size:13px;color:var(--text2);line-height:1.8;">
      ✦ Food search hides matching items<br>
      ✦ Meal builder hides restricted options<br>
      ✦ Quick Log only matches safe foods<br>
      ✦ Your restrictions sync across all devices
    </div>
  </div>`;
}

// ── GOALS ─────────────────────────────────────────────────────
function renderGoals(){
const el=document.getElementById(‘t-goals’);
el.innerHTML=`

  <div class="card cg" style="margin-bottom:12px;"><span class="lbl g">YOUR PROFILE</span>
    <div class="afield" style="margin-bottom:12px;"><label class="lbl">Name</label><input class="inp" id="gn" value="${esc(S.name||'')}" placeholder="Your name"></div>
    <button class="btn bsm" onclick="saveS({name:document.getElementById('gn').value})">Save Name</button>
  </div>
  <div class="card" style="margin-bottom:12px;"><span class="lbl gd">WEIGHT GOAL</span>
    <div class="g2"><div><label class="lbl">Start Weight</label><input class="inp" id="gsw" type="number" step="0.1" value="${S.startW||180}"></div><div><label class="lbl">Goal Weight</label><input class="inp" id="ggw" type="number" step="0.1" value="${S.goalW||170}"></div></div>
    <div class="g2"><div><label class="lbl">Start Date</label><input class="inp" id="gsd" type="date" value="${S.startD||''}"></div><div><label class="lbl">Goal Date</label><input class="inp" id="ggd" type="date" value="${S.goalD||''}"></div></div>
    <button class="btn bgd bsm" onclick="saveS({startW:+document.getElementById('gsw').value,goalW:+document.getElementById('ggw').value,startD:document.getElementById('gsd').value,goalD:document.getElementById('ggd').value})">Save Goals</button>
  </div>
  <div class="card csk" style="margin-bottom:12px;"><span class="lbl sk">DAILY TARGETS</span>
    <div class="g2"><div><label class="lbl">Calories</label><input class="inp" id="gc" type="number" value="${S.cal||2000}"></div><div><label class="lbl">Protein (g)</label><input class="inp" id="gp" type="number" value="${S.pro||170}"></div></div>
    <label class="lbl">Weekly Workouts</label><input class="inp" id="gw" type="number" value="${S.wkGoal||4}" style="margin-bottom:10px;">
    <button class="btn bsk bsm" onclick="saveS({cal:+document.getElementById('gc').value,pro:+document.getElementById('gp').value,wkGoal:+document.getElementById('gw').value})">Save Targets</button>
  </div>`;
}

// ── INIT ──────────────────────────────────────────────────────
// Close search results on outside tap
document.addEventListener(‘click’,e=>{
if(!e.target.closest(’.sr’)&&!e.target.classList.contains(‘inp’)){
document.querySelectorAll(’.sr’).forEach(r=>r.style.display=‘none’);
}
});
</script>

</body>
</html>
