<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>FitTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root{
–bg:#060608;
–bg2:#0d0d12;
–bg3:#12121a;
–border:#1e1e2e;
–border2:#2a2a3e;
–text:#f0f0ff;
–muted:#4a4a6a;
–muted2:#6a6a8a;
–cyan:#00e5ff;
–lime:#b6ff00;
–mag:#ff2d78;
–gold:#ffb700;
–purple:#9d00ff;
}

html,body{
height:100%;
background:var(–bg);
color:var(–text);
font-family:‘Rajdhani’,sans-serif;
overflow:hidden;
}

/* scanline overlay */
body::before{
content:’’;
position:fixed;inset:0;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.015) 2px,rgba(0,229,255,.015) 4px);
pointer-events:none;z-index:999;
}

.screen{display:none;position:fixed;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen.active{display:block;}

/* ── HOME ── */
.home-wrap{padding:60px 18px 48px;min-height:100%;}

.home-eyebrow{font-size:10px;letter-spacing:6px;color:var(–cyan);text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.home-title{font-family:‘Black Ops One’,sans-serif;font-size:62px;letter-spacing:3px;color:#fff;line-height:.95;margin-bottom:4px;}
.home-title span{color:var(–cyan);text-shadow:0 0 20px var(–cyan),0 0 60px rgba(0,229,255,.3);}
.home-sub{font-size:12px;color:var(–muted2);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}

.wcard{
position:relative;overflow:hidden;cursor:pointer;
margin-bottom:10px;border-radius:16px;
padding:18px 18px 18px 22px;
background:var(–bg3);
border:1px solid var(–border2);
display:flex;align-items:center;gap:14px;
transition:transform .12s;
}
.wcard::before{
content:’’;position:absolute;left:0;top:0;bottom:0;width:3px;
background:var(–c);
box-shadow:0 0 12px var(–c),0 0 24px var(–c);
}
.wcard::after{
content:’’;position:absolute;inset:0;
background:linear-gradient(100deg,var(–c) 0%,transparent 40%);
opacity:.04;pointer-events:none;
}
.wcard:active{transform:scale(.97);}
.wcard-emoji{font-size:30px;flex-shrink:0;filter:drop-shadow(0 0 8px var(–c));}
.wcard-name{font-family:‘Black Ops One’,sans-serif;font-size:18px;letter-spacing:1px;color:#fff;line-height:1.2;}
.wcard-tag{font-size:11px;color:var(–muted2);margin-top:3px;letter-spacing:.5px;}
.wcard-arrow{margin-left:auto;font-size:18px;color:var(–c);opacity:.7;flex-shrink:0;text-shadow:0 0 8px var(–c);}

/* ── OVERVIEW ── */
.ov-wrap{padding-bottom:130px;}
.ov-hero{
padding:52px 20px 20px;
background:var(–bg);
position:sticky;top:0;z-index:5;
border-bottom:1px solid var(–border);
}
.ov-back{font-size:12px;color:var(–muted2);cursor:pointer;margin-bottom:14px;letter-spacing:2px;text-transform:uppercase;display:inline-block;}
.ov-back:active{color:var(–cyan);}
.ov-title{font-family:‘Black Ops One’,sans-serif;font-size:36px;letter-spacing:2px;line-height:1;}
.ov-tag{font-size:11px;color:var(–muted2);margin-top:5px;letter-spacing:2px;text-transform:uppercase;}
.ov-list{padding:16px 18px;}

.ov-phase-lbl{font-size:9px;font-weight:700;letter-spacing:4px;color:var(–muted);text-transform:uppercase;padding:16px 0 8px;}
.ov-group{
border-radius:14px;background:var(–bg3);
border:1px solid var(–border2);
margin-bottom:10px;overflow:hidden;
}
.ov-pair-header{
padding:8px 14px;
font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
border-bottom:1px solid var(–border);
}
.ov-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(–border);}
.ov-item:last-child{border-bottom:none;}
.ov-ltr{
width:22px;height:22px;border-radius:6px;
display:flex;align-items:center;justify-content:center;
font-size:10px;font-weight:700;flex-shrink:0;
font-family:‘Black Ops One’,sans-serif;
}
.ov-iname{font-size:14px;font-weight:600;color:var(–text);}
.ov-imeta{font-size:11px;color:var(–muted2);margin-top:2px;}

.ov-start-wrap{
position:fixed;bottom:0;left:0;right:0;
padding:16px 18px 40px;
background:linear-gradient(0deg,var(–bg) 60%,transparent);
}
.ov-start{
width:100%;padding:17px;border:none;border-radius:14px;
font-family:‘Black Ops One’,sans-serif;font-size:20px;letter-spacing:4px;
color:#000;cursor:pointer;position:relative;overflow:hidden;
}
.ov-start::after{
content:’’;position:absolute;inset:0;
background:linear-gradient(90deg,transparent 30%,rgba(255,255,255,.2) 50%,transparent 70%);
transform:translateX(-100%);
animation:shimmer 2.5s infinite;
}
@keyframes shimmer{to{transform:translateX(200%);}}

/* ── STORY ── */
.story-wrap{min-height:100vh;display:flex;flex-direction:column;position:relative;}

/* HUD bars */
.story-bars{
display:flex;gap:4px;padding:16px 16px 0;
position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;
}
.sbar{flex:1;height:2px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;}
.sbar-fill{height:100%;border-radius:999px;}

.story-tap-prev{position:absolute;left:0;top:0;bottom:0;width:28%;z-index:8;}
.story-tap-next{position:absolute;right:0;top:0;bottom:0;width:28%;z-index:8;}

.story-content{
flex:1;display:flex;flex-direction:column;justify-content:flex-end;
padding:52px 18px 20px;position:relative;z-index:9;
}

.story-hud{
display:flex;align-items:center;gap:8px;margin-bottom:14px;
}
.story-phase-badge{
font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
padding:3px 8px;border-radius:4px;
border:1px solid currentColor;
}
.story-step{font-size:11px;color:var(–muted2);letter-spacing:1px;}

/* exercise block */
.ex-block{
border-radius:14px;padding:14px 14px 12px;margin-bottom:10px;
background:rgba(255,255,255,.04);
border:1px solid var(–border2);
position:relative;overflow:hidden;
}
.ex-block::before{
content:’’;position:absolute;left:0;top:0;bottom:0;width:2px;
}
.ex-block-glow{
position:absolute;top:-40px;right:-40px;
width:120px;height:120px;border-radius:50%;
opacity:.06;pointer-events:none;
}

.ex-ltr-badge{
display:inline-flex;align-items:center;justify-content:center;
width:20px;height:20px;border-radius:5px;
font-size:9px;font-weight:700;font-family:‘Black Ops One’,sans-serif;
margin-right:8px;vertical-align:middle;flex-shrink:0;
}
.ex-name-big{
font-family:‘Black Ops One’,sans-serif;
font-size:24px;letter-spacing:1px;line-height:1.1;
margin-bottom:3px;display:inline;
}
.ex-meta-sm{font-size:12px;color:var(–muted2);margin-bottom:8px;letter-spacing:.5px;}
.ex-cue-sm{
font-size:12px;line-height:1.6;color:rgba(255,255,255,.5);
background:rgba(0,0,0,.35);
border-radius:10px;padding:10px 12px;margin-bottom:10px;
border-left:2px solid var(–border2);
}
.pr-badge{
font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;
display:inline-block;margin-bottom:8px;letter-spacing:1px;
}

/* set dots */
.set-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2px;}
.s-dot{
width:44px;height:44px;border-radius:10px;
border:1.5px solid rgba(255,255,255,.12);
display:flex;align-items:center;justify-content:center;
font-size:14px;font-weight:700;color:rgba(255,255,255,.25);
cursor:pointer;position:relative;z-index:15;
font-family:‘Rajdhani’,sans-serif;
transition:border-color .15s,color .15s,background .15s;
}
.s-dot:active{transform:scale(.88);}
.s-dot.hit{color:#000 !important;}

/* plank */
.plank-block{
border-radius:14px;padding:20px;margin-bottom:10px;
text-align:center;
background:rgba(0,0,0,.4);
border:1px solid var(–border2);
}
.plank-time{
font-family:‘Black Ops One’,sans-serif;
font-size:68px;line-height:1;margin-bottom:4px;
}
.plank-lbl{font-size:9px;letter-spacing:4px;color:var(–muted);text-transform:uppercase;margin-bottom:14px;}
.plank-btn{
display:inline-block;padding:11px 28px;border-radius:10px;
font-family:‘Black Ops One’,sans-serif;font-size:15px;letter-spacing:2px;
cursor:pointer;border:1.5px solid;position:relative;z-index:15;
}
.plank-btn:active{opacity:.7;}

/* PR inputs */
.pr-row{display:flex;gap:7px;margin-top:8px;position:relative;z-index:15;}
.pr-inp{
flex:1;padding:9px 10px;border-radius:10px;
background:rgba(0,0,0,.5);
border:1.5px solid var(–border2);
color:var(–text);font-size:13px;
font-family:‘Rajdhani’,sans-serif;font-weight:600;
-webkit-appearance:none;
}
.pr-inp::placeholder{color:var(–muted);}
.pr-inp:focus{outline:none;border-color:var(–cyan);}
.pr-save{
background:rgba(0,229,255,.08);
border:1.5px solid rgba(0,229,255,.25);
border-radius:10px;padding:9px 12px;
color:var(–cyan);font-size:11px;font-weight:700;
cursor:pointer;font-family:‘Rajdhani’,sans-serif;
white-space:nowrap;letter-spacing:1px;position:relative;z-index:15;
}
.pr-save:active{background:rgba(0,229,255,.15);}

/* NEXT button */
.story-next{
width:100%;padding:15px;border:none;border-radius:13px;
font-family:‘Black Ops One’,sans-serif;font-size:18px;letter-spacing:4px;
color:#000;cursor:pointer;margin-top:8px;
position:relative;z-index:15;overflow:hidden;
}
.story-next::after{
content:’’;position:absolute;inset:0;
background:linear-gradient(90deg,transparent 30%,rgba(255,255,255,.25) 50%,transparent 70%);
transform:translateX(-100%);
animation:shimmer 2s infinite;
}
.story-next:active{opacity:.8;}

/* DIVIDER */
.pair-divider{
text-align:center;font-size:9px;letter-spacing:4px;
color:var(–muted);text-transform:uppercase;
margin:4px 0;padding:4px 0;
display:flex;align-items:center;gap:8px;
}
.pair-divider::before,.pair-divider::after{content:’’;flex:1;height:1px;background:var(–border);}

/* REST */
.rest-over{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.96);
z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:4px;
}
.rest-over.on{display:flex;}
.rest-lbl{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(–muted2);}
.rest-num{
font-family:‘Black Ops One’,sans-serif;font-size:120px;line-height:1;
color:var(–cyan);text-shadow:0 0 40px var(–cyan),0 0 80px rgba(0,229,255,.4);
}
.rest-ring{
width:160px;height:160px;position:relative;margin:-20px;
}
.rest-skip{
margin-top:28px;padding:13px 40px;
background:rgba(255,255,255,.05);
border:1px solid var(–border2);
border-radius:12px;
color:var(–muted2);font-size:13px;font-weight:700;
cursor:pointer;font-family:‘Rajdhani’,sans-serif;letter-spacing:2px;text-transform:uppercase;
}
.rest-skip:active{color:var(–text);}

/* DONE */
.done-wrap{
min-height:100%;display:flex;flex-direction:column;
align-items:center;justify-content:center;
padding:40px 24px;text-align:center;
}
.done-emoji{font-size:64px;margin-bottom:12px;}
.done-title{
font-family:‘Black Ops One’,sans-serif;font-size:52px;letter-spacing:5px;margin-bottom:6px;
}
.done-sub{font-size:14px;color:var(–muted2);margin-bottom:40px;line-height:1.7;letter-spacing:.5px;}
.done-stat{
font-family:‘Black Ops One’,sans-serif;font-size:36px;
margin-bottom:4px;
}
.done-stat-lbl{font-size:10px;letter-spacing:3px;color:var(–muted);text-transform:uppercase;margin-bottom:32px;}
.done-home{
padding:15px 44px;border:none;border-radius:13px;
font-family:‘Black Ops One’,sans-serif;font-size:18px;letter-spacing:3px;
color:#000;cursor:pointer;
background:var(–cyan);
box-shadow:0 0 24px rgba(0,229,255,.4);
}
.done-home:active{opacity:.8;}

/* entry anim */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.fadein{animation:fadeUp .35s ease both;}

/* ── MORNING BRIEF ── */
.brief-wrap{padding:52px 18px 48px;min-height:100%;}
.brief-back{font-size:12px;color:var(--muted2);cursor:pointer;margin-bottom:20px;letter-spacing:2px;text-transform:uppercase;display:inline-block;}
.brief-back:active{color:var(--cyan);}
.brief-eyebrow{font-size:9px;letter-spacing:6px;color:var(--cyan);text-transform:uppercase;margin-bottom:4px;font-weight:700;}
.brief-title{font-family:'Black Ops One',sans-serif;font-size:42px;letter-spacing:2px;color:#fff;line-height:1;margin-bottom:2px;}
.brief-date{font-size:11px;color:var(--muted2);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;}

.brief-rec{
border-radius:16px;padding:20px;margin-bottom:14px;
background:var(--bg3);border:1px solid var(--border2);
position:relative;overflow:hidden;
}
.brief-rec::before{
content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
background:var(--c);box-shadow:0 0 12px var(--c),0 0 24px var(--c);
}
.brief-rec::after{
content:'';position:absolute;inset:0;
background:linear-gradient(100deg,var(--c) 0%,transparent 40%);
opacity:.04;pointer-events:none;
}
.brief-rec-eyebrow{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;}
.brief-rec-name{font-family:'Black Ops One',sans-serif;font-size:26px;letter-spacing:1px;color:#fff;}
.brief-rec-tag{font-size:11px;color:var(--muted2);margin-top:3px;letter-spacing:.5px;margin-bottom:14px;}
.brief-rec-btn{
display:inline-block;padding:11px 24px;border-radius:10px;
font-family:'Black Ops One',sans-serif;font-size:14px;letter-spacing:3px;
color:#000;cursor:pointer;border:none;
position:relative;z-index:1;
}
.brief-rec-btn:active{opacity:.8;}

.brief-stats{display:flex;gap:10px;margin-bottom:14px;}
.brief-stat{
flex:1;border-radius:14px;padding:16px 14px;
background:var(--bg3);border:1px solid var(--border2);text-align:center;
}
.brief-stat-num{font-family:'Black Ops One',sans-serif;font-size:32px;line-height:1;}
.brief-stat-lbl{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:4px;}

.brief-section-lbl{font-size:9px;font-weight:700;letter-spacing:4px;color:var(--muted);text-transform:uppercase;padding:4px 0 10px;}
.brief-pr-card{
border-radius:12px;background:var(--bg3);border:1px solid var(--border2);
margin-bottom:8px;padding:12px 14px;
display:flex;align-items:center;justify-content:space-between;
}
.brief-pr-name{font-size:14px;font-weight:600;}
.brief-pr-val{font-size:13px;color:var(--cyan);font-weight:700;font-family:'Black Ops One',sans-serif;}
.brief-pr-date{font-size:10px;color:var(--muted);margin-top:2px;}
.brief-empty{font-size:13px;color:var(--muted);padding:10px 0;letter-spacing:.5px;}

.brief-hist-card{
border-radius:12px;background:var(--bg3);border:1px solid var(--border2);
margin-bottom:8px;padding:10px 14px;
display:flex;align-items:center;gap:12px;
}
.brief-hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.brief-hist-name{font-size:13px;font-weight:600;}
.brief-hist-date{font-size:10px;color:var(--muted);margin-top:2px;}

/* home brief button */
.brief-entry{
border-radius:16px;padding:14px 18px;margin-bottom:16px;
background:var(--bg3);border:1px solid rgba(0,229,255,.2);
display:flex;align-items:center;gap:14px;cursor:pointer;
position:relative;overflow:hidden;
transition:transform .12s;
}
.brief-entry::after{
content:'';position:absolute;inset:0;
background:linear-gradient(100deg,var(--cyan) 0%,transparent 40%);
opacity:.04;pointer-events:none;
}
.brief-entry:active{transform:scale(.97);}
.brief-entry-icon{font-size:28px;flex-shrink:0;filter:drop-shadow(0 0 8px var(--cyan));}
.brief-entry-name{font-family:'Black Ops One',sans-serif;font-size:17px;letter-spacing:1px;color:var(--cyan);}
.brief-entry-sub{font-size:11px;color:var(--muted2);margin-top:2px;letter-spacing:.5px;}
.brief-entry-arrow{margin-left:auto;font-size:18px;color:var(--cyan);opacity:.7;flex-shrink:0;text-shadow:0 0 8px var(--cyan);}

</style>
</head>
<body>
<div id="s-home" class="screen active"></div>
<div id="s-brief" class="screen"></div>
<div id="s-overview" class="screen"></div>
<div id="s-story" class="screen"></div>
<div id="s-done" class="screen"></div>
<div class="rest-over" id="rest-over">
  <div class="rest-lbl">Rest</div>
  <div class="rest-num" id="rest-num">90</div>
  <div class="rest-lbl">seconds</div>
  <button class="rest-skip" onclick="skipRest()">SKIP REST</button>
</div>
<script>

// ─────────────────────────────────────────────
// WORKOUT DATA
// Each workout is a list of SLIDES.
// A slide has 1 or 2 exercises.
// ─────────────────────────────────────────────
var WK = {
push:{
name:‘Push Day’, emoji:‘💪’, tag:‘Chest · Shoulders · Triceps’, color:’#e8533a’,
slides:[
// WARMUP slides
{phase:‘WARMUP’, exs:[
{name:‘Arm Circles + Band Pull-Aparts’, meta:‘2 x 10 each’, rest:0, type:‘reps’, sets:2,
cue:‘Roll shoulders forward 10 times then backward. Then pull a band or towel apart at shoulder width 10 times. Opens the rotator cuff.’}
]},
{phase:‘WARMUP’, exs:[
{name:‘Plank’, meta:‘3 minutes’, rest:0, type:‘plank’, sets:1,
cue:‘Elbows under shoulders. Squeeze glutes and abs. Do not let hips sag. 3 full minutes — no breaks.’}
]},
{phase:‘WARMUP’, exs:[
{name:‘Pushup Warm-Up’, meta:‘2 x 10 reps’, rest:30, type:‘reps’, sets:2,
cue:‘Controlled tempo, chest to floor. Gets blood into chest, shoulders, and triceps before loading them.’}
]},
// WORKOUT slides — 2 exercises per slide
{phase:‘WORKOUT’, exs:[
{name:‘Bench Press’, meta:‘4 sets x 8-10 reps’, rest:90, type:‘weighted’, sets:4,
cue:‘Bar to mid-chest, elbows 45 degrees. Lower 2 seconds, press explosively. Squeeze the bar like bending it.’},
{name:‘Incline DB Press’, meta:‘3 sets x 10-12 reps’, rest:75, type:‘weighted’, sets:3,
cue:‘30-45 degree bench. Feel the stretch at the bottom. Each side works independently.’}
]},
{phase:‘WORKOUT’, exs:[
{name:‘Lateral Raise’, meta:‘3 sets x 15 reps’, rest:60, type:‘weighted’, sets:3,
cue:‘Lead with elbows not hands. Lighter than you think. Slow it down and feel the shoulder burn.’},
{name:‘Tricep Pushdown’, meta:‘3 sets x 12-15 reps’, rest:60, type:‘weighted’, sets:3,
cue:‘Elbows pinned to sides. Full lockout every rep. Squeeze hard at the bottom.’}
]},
{phase:‘WORKOUT’, exs:[
{name:‘Overhead Tricep Ext’, meta:‘3 sets x 12 reps’, rest:60, type:‘weighted’, sets:3,
cue:‘Elbows forward, do not flare. Deep stretch at the top hits the long head of the tricep.’},
{name:‘Core’, meta:‘10 minutes’, rest:0, type:‘timed’, sets:1,
cue:‘Plank, dead bugs, hollow holds. Non-negotiable. Finish every push day with core work.’}
]}
]
},
pull:{
name:‘Pull Day’, emoji:‘🔗’, tag:‘Back · Biceps’, color:’#2a7aaa’,
slides:[
{phase:‘WARMUP’, exs:[
{name:‘Shoulder Rolls + Cat-Cow’, meta:‘10 rolls, 10 cat-cows’, rest:0, type:‘reps’, sets:1,
cue:‘Big slow shoulder circles forward then back. Then on all fours, arch your spine up then sink it down. Mobilizes the whole upper body.’}
]},
{phase:‘WARMUP’, exs:[
{name:‘Plank’, meta:‘3 minutes’, rest:0, type:‘plank’, sets:1,
cue:‘Elbows under shoulders. Core braced. 3 full minutes. Core stability is essential before heavy rows.’}
]},
{phase:‘WARMUP’, exs:[
{name:‘Light Pulldowns’, meta:‘2 x 15 reps’, rest:30, type:‘reps’, sets:2,
cue:‘Light weight, full range. Depress shoulder blades before each pull. Activates the lats before loading them.’}
]},
{phase:‘WORKOUT’, exs:[
{name:‘Wide Grip Pulldown’, meta:‘4 sets x 8-10 reps’, rest:90, type:‘weighted’, sets:4,
cue:‘Depress shoulder blades before pulling. Drive elbows to hip pockets. Dead hang between every rep.’},
{name:‘Seated Cable Row’, meta:‘3 sets x 10-12 reps’, rest:75, type:‘weighted’, sets:3,
cue:‘Pull to navel. Elbows must travel behind your torso. 1 second pause at full contraction.’}
]},
{phase:‘WORKOUT’, exs:[
{name:‘Close Grip Pulldown’, meta:‘3 sets x 10-12 reps’, rest:75, type:‘weighted’, sets:3,
cue:‘Chest tall, pull to sternum. Hits lower lats that wide grip misses.’},
{name:‘Cable Bicep Curl’, meta:‘3 sets x 12-15 reps’, rest:60, type:‘weighted’, sets:3,
cue:‘Elbows pinned. Full extension at the bottom. Cables keep tension where dumbbells go slack.’}

var ROTATION=['push','pull','lower','upper','recovery'];

function todayStr(){
var d=new Date();
return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
}

function fmtDate(iso){
var parts=iso.split('-');
var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
return months[parseInt(parts[1],10)-1]+' '+parseInt(parts[2],10)+', '+parts[0];
}

function calcStreak(hist){
if(!hist||!hist.length){return 0;}
var days={};
for(var i=0;i<hist.length;i++){days[hist[i].date]=true;}
var streak=0;
var d=new Date();
while(true){
var s=d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
if(days[s]){streak++;d.setDate(d.getDate()-1);}else{break;}
}
return streak;
}

function recWorkout(hist){
if(!hist||!hist.length){return 'push';}
// find most recent entry
var last=hist[hist.length-1];
var idx=ROTATION.indexOf(last.key);
return ROTATION[(idx+1)%ROTATION.length];
}

function buildSlideBody(slide, color){

html+=buildExBlock(exs[0], ‘A’, color, 0, setsDoneA, false);
html+=’<div class="pair-divider">THEN</div>’;
html+=buildExBlock(exs[1], ‘B’, color, 1, setsDoneB, false);
}
return html;
}

function buildExBlock(ex, label, color, exIdx, doneSets, isSingle){

var isReps=(ex.type===‘reps’);
var borderColor = exIdx===0 ? color : lighten(color);

var html=’<div class="ex-block" style="border-color:'+borderColor+'30;"><div class="ex-block-glow" style="background:'+borderColor+';"></div><div style="position:absolute;left:0;top:0;bottom:0;width:2px;background:'+borderColor+';box-shadow:0 0 8px '+borderColor+';"></div>’;

// header
html+=’<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">’
+’<span class="ex-ltr-badge" style="background:'+borderColor+'20;border-color:'+borderColor+'50;color:'+borderColor+';">’+label+’</span>’
+’<div style="font-family:Bebas Neue,sans-serif;font-size:'+(isSingle?'34':'28')+'px;letter-spacing:2px;line-height:1;">’+ex.name+’</div>’
+’</div>’;

// PR badge
var prInfo=prs[ex.name];
if(prInfo){
html+=’<div class="pr-badge" style="background:'+borderColor+'15;color:'+borderColor+';border:1px solid '+borderColor+'35;">⚡ PR: ’+prInfo.weight+‘lb x ‘+prInfo.reps+’</div>’;
}

html+=’<div style="font-size:12px;color:rgba(255,255,255,.45);margin-bottom:8px;">’+ex.meta+’</div>’;
html+=’<div class="ex-cue-sm">’+ex.cue+’</div>’;

// plank timer
if(isPlank){
html+=’<div class="plank-block" style="border-color:'+color+'30;">’
+’<div class="plank-time" id="plank-disp" style="color:'+color+';text-shadow:0 0 20px '+color+'60;">3:00</div>’
+’<div class="plank-lbl">hold</div>’
+’<div class="plank-btn" id="plank-btn" onclick="togglePlank()" style="color:'+color+';border-color:'+color+'50;background:'+color+'10;">START TIMER</div>’
+’</div>’;
}

// set dots for weighted / reps
if(isWeighted||isReps){
var varName = exIdx===0 ? ‘setsDoneA’ : ‘setsDoneB’;
html+=’<div class="set-row" id="dots-'+exIdx+'">’;
for(var s=0;s<ex.sets;s++){
var hit=s<doneSets;
html+=’<div class=“s-dot’+(hit?’ hit’:’’)+’” id=“dot-’+exIdx+’-’+s+’”’
+’ style=”’+(hit?‘border-color:’+borderColor+’;color:’+borderColor+’;background:’+borderColor+‘18;’:’’)+’”’
+’ onclick=“hitDot(’+exIdx+’,’+s+’,’+ex.sets+’,’+ex.rest+’)”>’+( s+1)+’</div>’;
}
html+=’</div>’;
}

// PR log for weighted
if(isWeighted){
html+=’<div class="pr-row">’
+’<input class="pr-inp" id="pw-'+exIdx+'" type="number" placeholder="lbs">’
+’<input class="pr-inp" id="pr-'+exIdx+'" type="number" placeholder="reps">’
+’<div class="pr-save" onclick="savePR(\''+ex.name+'\','+exIdx+')">Save PR</div>’
+’</div>’;
}

html+=’</div>’;
return html;
}

function lighten(hex){
// return a slightly muted version for the B exercise
return hex+‘cc’;
}

// ─────────────────────────────────────────────
// SET DOTS
// ─────────────────────────────────────────────
function hitDot(exIdx, dotIdx, totalSets, restSecs){
var w=WK[curKey];
var slide=w.slides[slideIdx];
var color = exIdx===0 ? w.color : w.color+‘cc’;

var cur = exIdx===0 ? setsDoneA : setsDoneB;
var newDone;
if(dotIdx < cur){
newDone = dotIdx; // undo
}else{
newDone = dotIdx + 1;
}
if(exIdx===0){setsDoneA=newDone;}else{setsDoneB=newDone;}

// update dots in place
for(var s=0;s<totalSets;s++){
var dot=document.getElementById(‘dot-’+exIdx+’-’+s);
if(!dot){continue;}
if(s<newDone){
dot.className=‘s-dot hit’;
dot.style.borderColor=color;
dot.style.color=color;
dot.style.background=color.replace(‘cc’,’’)+‘18’;
dot.style.boxShadow=‘0 0 10px ‘+color.replace(‘cc’,’’)+‘70’;
}else{
dot.className=‘s-dot’;
dot.style.borderColor=’’;
dot.style.color=’’;
dot.style.background=’’;
}
}

if(newDone > 0 && newDone < totalSets && restSecs > 0){
showRest(restSecs);
}
}

function savePR(name, exIdx){
var wEl=document.getElementById(‘pw-’+exIdx);
var rEl=document.getElementById(‘pr-’+exIdx);
if(!wEl||!rEl){return;}
var wv=parseFloat(wEl.value);
var rv=parseInt(rEl.value);
if(!wv||!rv){return;}
prs[name]={weight:wv,reps:rv,date:new Date().toISOString().split(‘T’)[0]};
ss(‘wt_prs’,prs);
wEl.value=’’;rEl.value=’’;
var btn=document.querySelector(’.pr-save’);
if(btn){
btn.textContent=‘Saved!’;
setTimeout(function(){var b=document.querySelector(’.pr-save’);if(b){b.textContent=‘Save PR’;}},1200);
}
}

if(plankRunning){
plankRunning=false;
if(plankTimer){clearInterval(plankTimer);plankTimer=null;}
var btn=document.getElementById(‘plank-btn’);
if(btn){btn.textContent=‘RESUME’;}
}else{
plankRunning=true;
if(plankLeft<=0){plankLeft=180;}
var btn2=document.getElementById(‘plank-btn’);
if(btn2){btn2.textContent=‘PAUSE’;}
plankTimer=setInterval(function(){
plankLeft–;
var disp=document.getElementById(‘plank-disp’);
if(disp){
var m=Math.floor(plankLeft/60);
var s=plankLeft%60;
disp.textContent=m+’:’+(s<10?‘0’:’’)+s;
}
if(plankLeft<=0){
clearInterval(plankTimer);plankTimer=null;plankRunning=false;
var disp2=document.getElementById(‘plank-disp’);
if(disp2){disp2.textContent=‘DONE!’;}
var btn3=document.getElementById(‘plank-btn’);
if(btn3){btn3.textContent=‘RESET’;btn3.onclick=function(){plankLeft=180;var d=document.getElementById(‘plank-disp’);if(d){d.textContent=‘3:00’;}btn3.textContent=‘START TIMER’;btn3.onclick=togglePlank;};}
}
},1000);
}
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function nextSlide(){
var total=WK[curKey].slides.length;
if(slideIdx>=total-1){
showDone();
return;
}
slideIdx++;
setsDoneA=0;
setsDoneB=0;
renderStory();
}

function prevSlide(){
if(slideIdx<=0){
openOverview(curKey);
return;
}
slideIdx–;
setsDoneA=0;
setsDoneB=0;
renderStory();
}

// ─────────────────────────────────────────────
// REST TIMER
// ─────────────────────────────────────────────
function showRest(secs){
restLeft=secs;
var ov=document.getElementById(‘rest-over’);
if(!ov){return;}
ov.className=‘rest-over on’;
updateRestDisplay();
if(restTimer){clearInterval(restTimer);}
restTimer=setInterval(function(){
restLeft–;
if(restLeft<=0){
clearInterval(restTimer);restTimer=null;
var ov2=document.getElementById(‘rest-over’);
if(ov2){ov2.className=‘rest-over’;}
}else{
updateRestDisplay();
}
},1000);
}

function updateRestDisplay(){
var el=document.getElementById(‘rest-num’);
if(el){el.textContent=restLeft;}
}

function skipRest(){
if(restTimer){clearInterval(restTimer);restTimer=null;}
var ov=document.getElementById(‘rest-over’);
if(ov){ov.className=‘rest-over’;}
}

function stopAllTimers(){
if(restTimer){clearInterval(restTimer);restTimer=null;}
if(plankTimer){clearInterval(plankTimer);plankTimer=null;}
plankRunning=false;
var ov=document.getElementById(‘rest-over’);
if(ov){ov.className=‘rest-over’;}
}

// ─────────────────────────────────────────────
// DONE
// ─────────────────────────────────────────────
function logWorkout(key){
var hist=sg('wt_history',[]);
var today=todayStr();
// only log once per day per workout key
if(hist.length>0&&hist[hist.length-1].key===key&&hist[hist.length-1].date===today){return;}
hist.push({key:key,date:today});
ss('wt_history',hist);
}

function showDone(){
stopAllTimers();
logWorkout(curKey);
var w=WK[curKey];
var el=document.getElementById(‘s-done’);
if(!el){return;}
var totalSets=0;
for(var i=0;i<w.slides.length;i++){
for(var j=0;j<w.slides[i].exs.length;j++){
totalSets+=w.slides[i].exs[j].sets;
}
}
el.innerHTML=’<div class="done-wrap fadein">’
+’<div class="done-emoji">⚡</div>’
+’<div class="done-title" style="color:'+w.color+';text-shadow:0 0 30px '+w.color+'60;">DONE!</div>’
+’<div class="done-stat" style="color:var(--cyan);text-shadow:0 0 20px var(--cyan);">’+totalSets+’</div>’
+’<div class="done-stat-lbl">sets completed</div>’
+’<div class="done-sub">’+w.name+’ complete.</div>’
+’<button class="done-home" onclick="renderHome()">BACK HOME</button>’
+’</div>’;
show(‘s-done’);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderHome();

</script>
</body>
</html>
