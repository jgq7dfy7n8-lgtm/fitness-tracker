<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FitTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --cr:#faf8f3;--wh:#fff;--s1:#f0ede6;--s2:#e2ddd4;--s3:#c8c0b0;--s4:#a89880;
  --fo:#1a3a2a;--fm:#2d5a3d;--fl:#4a8a5d;--sa:#7aaa8a;--sl:#b8d4c0;--sp:#e8f4ec;
  --go:#c8882a;--gp:#fdf5e4;--co:#d45a3a;--cp:#fdf0ec;--sk:#2a7aaa;--skp:#e4f2fb;
  --tx:#1a1510;--t2:#3d3020;--mu:#7a6a55;--fa:#a89880;
  --rd:16px;--sh:0 2px 12px rgba(26,20,10,.08);
}
html,body{height:100%;background:var(--cr);color:var(--tx);font-family:'DM Sans',sans-serif;}
body{padding-bottom:80px;}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(–fo),var(–fm));padding:24px 18px 0;position:relative;}
.hdr::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(–sa),#c8882a,var(–sa));}
.htop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.hlb{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:4px;font-family:‘Space Grotesk’,sans-serif;margin-bottom:4px;}
.hwt{font-family:‘Playfair Display’,serif;font-size:42px;font-weight:900;color:#fff;line-height:1;}
.hwt span{font-size:14px;font-weight:400;color:rgba(255,255,255,.5);margin-left:2px;font-family:‘DM Sans’,sans-serif;}
.hsb{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px;}
.hpill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:10px 14px;text-align:right;}
.hpl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(–sl);font-family:‘Space Grotesk’,sans-serif;}
.hpv{font-family:‘Playfair Display’,serif;font-size:24px;font-weight:900;color:#fff;}
.hpd{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px;}
.pbar{height:5px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden;margin-bottom:13px;}
.pfil{height:100%;border-radius:999px;background:linear-gradient(90deg,var(–sa),#c8882a);transition:width .8s ease;}
.hrow{display:flex;gap:8px;align-items:center;padding-bottom:14px;}
.dpil{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:9px;color:#fff;padding:7px 11px;font-size:12px;font-family:‘DM Sans’,sans-serif;}
.tbtn{background:rgba(122,170,138,.3);border:1px solid rgba(122,170,138,.5);border-radius:9px;color:var(–sl);padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:‘DM Sans’,sans-serif;}

/* NAV */
.nav{position:fixed;bottom:0;left:0;width:100%;background:rgba(255,255,255,.97);border-top:1px solid var(–s2);padding:6px 2px 18px;display:flex;z-index:100;backdrop-filter:blur(20px);}
.nb{flex:1;padding:6px 2px;background:none;border:none;color:var(–fa);font-size:6px;letter-spacing:.8px;cursor:pointer;font-family:‘Space Grotesk’,sans-serif;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px;text-transform:uppercase;transition:color .2s;border-radius:10px;}
.nb.on{color:var(–fl);}
.nb .ic{font-size:18px;}

/* TABS */
.tab{display:none;padding:18px 16px 20px;}
.tab.on{display:block;}

/* CARDS */
.card{background:#fff;border-radius:var(–rd);padding:16px;border:1px solid var(–s2);margin-bottom:11px;box-shadow:var(–sh);}
.cg{border-left:4px solid var(–fl);background:linear-gradient(135deg,var(–sp),#fff);}
.cgd{border-left:4px solid var(–go);background:linear-gradient(135deg,var(–gp),#fff);}
.csk{border-left:4px solid var(–sk);background:linear-gradient(135deg,var(–skp),#fff);}

/* LABELS */
.lbl{font-family:‘Space Grotesk’,sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(–mu);display:block;margin-bottom:8px;}
.lbl.g{color:var(–fl);}.lbl.gd{color:var(–go);}.lbl.sk{color:var(–sk);}
.bnum{font-family:‘Playfair Display’,serif;font-size:32px;font-weight:900;color:var(–tx);}

/* INPUTS */
.inp{background:var(–s1);border:1.5px solid var(–s2);border-radius:11px;padding:11px 13px;color:var(–tx);font-size:14px;width:100%;font-family:‘DM Sans’,sans-serif;-webkit-appearance:none;}
.inp:focus{outline:none;border-color:var(–fl);}

/* BUTTONS */
.btn{background:linear-gradient(135deg,var(–fm),var(–fo));border:none;border-radius:11px;color:#fff;padding:11px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:‘DM Sans’,sans-serif;box-shadow:0 3px 12px rgba(26,58,42,.25);}
.btn.gd{background:linear-gradient(135deg,#e0a040,var(–go));}
.btn.sk{background:linear-gradient(135deg,#3a9acc,var(–sk));}
.btn.gh{background:var(–s1);color:var(–t2);box-shadow:none;border:1.5px solid var(–s2);}
.btn.sm{padding:8px 12px;font-size:12px;border-radius:9px;}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px;}

/* SEGMENTS */
.seg{display:flex;background:var(–s1);border-radius:12px;padding:3px;margin-bottom:14px;border:1px solid var(–s2);}
.sb{flex:1;padding:9px 3px;background:none;border:none;border-radius:9px;color:var(–mu);font-size:9px;letter-spacing:1.5px;cursor:pointer;font-family:‘Space Grotesk’,sans-serif;font-weight:700;text-transform:uppercase;transition:all .2s;}
.sb.on{background:#fff;color:var(–fo);box-shadow:0 2px 6px rgba(0,0,0,.08);}

/* FOOD */
.frow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(–s1);}
.frow:last-child{border-bottom:none;}
.mitem{background:var(–s1);border-radius:10px;padding:9px 12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.sr{background:#fff;border:1.5px solid var(–s2);border-radius:12px;margin-top:5px;max-height:260px;overflow-y:auto;box-shadow:0 8px 32px rgba(26,20,10,.14);display:none;position:relative;z-index:50;}
.sri{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(–s1);display:flex;justify-content:space-between;align-items:center;}
.sri:active{background:var(–sp);}
.sri:last-child{border-bottom:none;}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.chip{padding:7px 12px;border-radius:999px;border:1.5px solid var(–s2);background:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:‘DM Sans’,sans-serif;color:var(–t2);}
.chip.on{background:var(–fo);border-color:var(–fo);color:#fff;}

/* TOGGLES */
.ri{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(–s1);}
.tgl{width:44px;height:24px;background:var(–s2);border-radius:999px;position:relative;cursor:pointer;border:none;flex-shrink:0;transition:background .2s;}
.tgl.on{background:var(–fl);}
.tgl::after{content:’’;position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tgl.on::after{transform:translateX(20px);}

/* MISC */
.rings{display:flex;justify-content:space-around;padding:6px 0 2px;}
.aitip{background:linear-gradient(135deg,#f5f2ff,#f0f8ff);border:1.5px solid rgba(122,100,200,.2);border-radius:var(–rd);padding:14px;margin-bottom:11px;}
.rmb{background:none;border:none;color:var(–fa);cursor:pointer;font-size:20px;padding:0 4px;}
.prb{background:linear-gradient(135deg,var(–go),#a06820);color:#fff;font-size:8px;font-weight:800;padding:3px 7px;border-radius:5px;letter-spacing:1px;font-family:‘Space Grotesk’,sans-serif;}
.cbox{background:var(–sp);border-radius:11px;padding:11px;border-left:3px solid var(–fl);margin-top:8px;}

@media(min-width:768px){
body{padding-left:220px;padding-bottom:0;}
.nav{left:0;top:0;bottom:0;width:220px;height:100vh;flex-direction:column;justify-content:flex-start;padding:24px 10px;border-top:none;border-right:1px solid var(–s2);gap:4px;}
.nb{flex:none;flex-direction:row;justify-content:flex-start;padding:11px 14px;font-size:10px;gap:10px;border-radius:11px;width:100%;}
.nb .ic{font-size:18px;}
.tab{padding:22px 40px 20px;}
.hdr{padding:28px 40px 0;}
}
</style>

</head>
<body>

<div class="hdr">
  <div class="htop">
    <div>
      <div class="hlb">FITTRACK</div>
      <div class="hwt" id="hw">180<span>lbs</span></div>
      <div class="hsb" id="hs">Start: 180 lbs</div>
    </div>
    <div class="hpill">
      <div class="hpl">GOAL</div>
      <div class="hpv" id="hg">170</div>
      <div class="hpd" id="hd">-- days</div>
    </div>
  </div>
  <div class="pbar"><div class="pfil" id="hp" style="width:0%"></div></div>
  <div class="hrow">
    <input type="date" id="sd" class="dpil">
    <div class="tbtn" onclick="goToday()">TODAY</div>
  </div>
</div>

<div class="tab on" id="t-home"></div>
<div class="tab" id="t-food"></div>
<div class="tab" id="t-lift"></div>
<div class="tab" id="t-weight"></div>
<div class="tab" id="t-stats"></div>
<div class="tab" id="t-diet"></div>
<div class="tab" id="t-goals"></div>

<nav class="nav">
  <div class="nb on" id="nb-home" onclick="go('home')"><span class="ic">⚡</span><span>Home</span></div>
  <div class="nb" id="nb-food" onclick="go('food')"><span class="ic">🍽️</span><span>Food</span></div>
  <div class="nb" id="nb-lift" onclick="go('lift')"><span class="ic">💪</span><span>Lift</span></div>
  <div class="nb" id="nb-weight" onclick="go('weight')"><span class="ic">⚖️</span><span>Weight</span></div>
  <div class="nb" id="nb-stats" onclick="go('stats')"><span class="ic">📈</span><span>Stats</span></div>
  <div class="nb" id="nb-diet" onclick="go('diet')"><span class="ic">🌿</span><span>Diet</span></div>
  <div class="nb" id="nb-goals" onclick="go('goals')"><span class="ic">⚙️</span><span>Goals</span></div>
</nav>

<script>
// STORAGE
function get(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// STATE
var DS={goalW:170,startW:180,goalD:'2026-05-06',startD:'2026-03-03',cal:2000,pro:170,wkGoal:4,name:'Matthew'};
var DRX={gluten:false,dairy:false,nuts:false,shellfish:false,eggs:false,soy:false,nightshades:false,vegetarian:false,vegan:false,custom:''};
var S=get('ft_s',DS),L=get('ft_l',{}),W=get('ft_w',{}),SC=get('ft_sc',{}),PR=get('ft_pr',{}),BM=get('ft_bm',{h:70,a:30,sx:'male'}),RX=get('ft_rx',DRX);
var selD=new Date().toISOString().split('T')[0],curTab='home',foodMode='log',wkMode='today';
var MB={base:null,protein:null,veggie:null,fruit:null,extras:[]};

// HELPERS
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function td(){return new Date().toISOString().split('T')[0];}
function dow(){return new Date().getDay();}
function dlog(){return L[selD]||{breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};}
function allF(){var d=dlog();return[].concat(d.breakfast||[],d.lunch||[],d.dinner||[],d.snacks||[]);}
function tots(){return allF().reduce(function(a,f){return{cal:a.cal+f.cal,p:a.p+(f.p||0),c:a.c+(f.c||0),f:a.f+(f.f||0)};},{cal:0,p:0,c:0,f:0});}
function curW(){var _ks=Object.keys(W).sort();return _ks.length?W[_ks[_ks.length-1]]:(S.startW||180);}
function prog(){var sw=S.startW||180,gw=S.goalW||170,lost=sw-curW(),rng=Math.abs(sw-gw)||10;return Math.min(100,Math.max(0,(lost/rng)*100));}
function dLeft(){var gd=new Date(S.goalD||'2026-05-06'),now=new Date();return Math.max(0,Math.round((gd-now)/864e5));}
function goToday(){selD=td();document.getElementById('sd').value=selD;render();}

// MUTATIONS
function addItem(sec,item){
  if(!L[selD])L[selD]={breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};
  if(!L[selD][sec])L[selD][sec]=[];
  L[selD][sec].push(item);set('ft_l',L);render();
}
function rmItem(sec,id){
  if(!L[selD]||!L[selD][sec])return;
  L[selD][sec]=L[selD][sec].filter(function(f){return f.id!==id;});
  set('ft_l',L);render();
}
function addWk(n){
  if(!n||!n.trim())return;
  if(!L[selD])L[selD]={breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};
  if(!L[selD].workouts)L[selD].workouts=[];
  L[selD].workouts.push({name:n,id:Date.now()});set('ft_l',L);render();
}
function rmWk(id){
  if(!L[selD]||!L[selD].workouts)return;
  L[selD].workouts=L[selD].workouts.filter(function(w){return w.id!==id;});
  set('ft_l',L);render();
}
function logW(v){if(!v)return;W[selD]=parseFloat(v);set('ft_w',W);render();}
function rmW(d){delete W[d];set('ft_w',W);render();}
function savePR(ex,wt,rp){if(!ex||!wt||!rp)return;PR[ex]={weight:parseFloat(wt),reps:parseInt(rp),date:selD};set('ft_pr',PR);render();}
function saveBM(h,a,sx){BM={h:parseFloat(h)||70,a:parseInt(a)||30,sx:sx||'male'};set('ft_bm',BM);render();}
function saveRX(k,v){RX[k]=v;set('ft_rx',RX);render();}
function saveS(obj){for(var k in obj)S[k]=obj[k];set('ft_s',S);render();}

// NAV
function go(name){
  var _tabs=document.querySelectorAll('.tab');for(var _ti=0;_ti<_tabs.length;_ti++)_tabs[_ti].classList.remove('on');
  var _nbs=document.querySelectorAll('.nb');for(var _ni=0;_ni<_nbs.length;_ni++)_nbs[_ni].classList.remove('on');
  document.getElementById('t-'+name).classList.add('on');
  document.getElementById('nb-'+name).classList.add('on');
  curTab=name;renderTab(name);
}
function renderTab(n){
  if(n==='home')renderHome();
  else if(n==='food')renderFood();
  else if(n==='lift')renderLift();
  else if(n==='weight')renderWeight();
  else if(n==='stats')renderStats();
  else if(n==='diet')renderDiet();
  else if(n==='goals')renderGoals();
}
function render(){renderHdr();renderTab(curTab);}

// HEADER
function renderHdr(){
  var cw=curW(),sw=S.startW||180,lost=sw-cw;
  document.getElementById('hw').innerHTML=cw+'<span>lbs</span>';
  document.getElementById('hs').textContent=lost>0?'Down '+lost.toFixed(1)+' lbs':'Start: '+sw+' lbs';
  document.getElementById('hg').textContent=S.goalW||170;
  document.getElementById('hd').textContent=dLeft()+'d left';
  document.getElementById('hp').style.width=prog()+'%';
}

function banned(){
  var b=[];
  if(RX.gluten)b.push('gluten');
  if(RX.dairy)b.push('dairy');
  if(RX.nuts)b.push('nuts');
  if(RX.shellfish)b.push('shellfish');
  if(RX.eggs)b.push('eggs');
  if(RX.soy)b.push('soy');
  if(RX.nightshades)b.push('nightshade');
  if(RX.vegetarian||RX.vegan)b.push('meat');
  if(RX.vegan){b.push('dairy');b.push('eggs');}
  return b;
}
function searchFood(q,max){
  if(!max)max=12;
  if(!q||q.length<2)return[];
  var ql=q.toLowerCase(),bn=banned();
  var res=[];
  for(var i=0;i<FDB.length;i++){
    var f=FDB[i];
    var skip=false;
    for(var j=0;j<f.t.length;j++){if(bn.indexOf(f.t[j])>=0){skip=true;break;}}
    if(skip)continue;
    var nl=f.n.toLowerCase();
    var s=0;
    if(nl===ql)s=100;
    else if(nl.indexOf(ql)===0)s=80;
    else if(nl.indexOf(ql)>=0)s=60;
    else if(ql.split(' ').every(function(w){return nl.indexOf(w)>=0;}))s=40;
    if(s>0)res.push({f:f,s:s});
  }
  res.sort(function(a,b){return b.s-a.s;});
  return res.slice(0,max).map(function(r){return r.f;});
}

function quickLog(){
  var inp=document.getElementById('ql');
  if(!inp||!inp.value.trim())return;
  var raw=inp.value.trim();
  var res=searchFood(raw,1);
  var hr=new Date().getHours();
  var sec=hr<11?'breakfast':hr<15?'lunch':hr<21?'dinner':'snacks';
  if(res.length){
    var f=res[0];
    addItem(sec,{n:f.n,name:f.n,cal:f.cal,p:f.p,c:f.c,f:f.f,e:f.e,id:Date.now()});
  }else{
    addItem(sec,{n:raw.slice(0,50),name:raw.slice(0,50),cal:0,p:0,c:0,f:0,e:'🍽️',id:Date.now()});

function doAddFood(sec,name,cal,p,c,f,e){

}

        var isSel=isMulti?(MB.extras||[]).some(function(x){return x.n===item2.n;}):(MB[key]&&MB[key].n===item2.n);

function toggleMB(cat,name,cal,p,c,f,e,isMulti){
  var item={n:name,cal:+cal,p:+p,c:+c,f:+f,e:e};
  if(isMulti){
    if(!MB.extras)MB.extras=[];
    var idx=-1;
    for(var i=0;i<MB.extras.length;i++){if(MB.extras[i].n===name){idx=i;break;}}
    if(idx>=0)MB.extras.splice(idx,1);else MB.extras.push(item);
  }else{
    MB[cat]=(MB[cat]&&MB[cat].n===name)?null:item;
  }
  renderFood();
}
function clearMB(){MB={base:null,protein:null,veggie:null,fruit:null,extras:[]};renderFood();}
function logMeal(){
  var hr=new Date().getHours();
  var sec=hr<11?'breakfast':hr<15?'lunch':hr<21?'dinner':'snacks';
  var parts=[];
  var cats=['base','protein','veggie','fruit'];
  for(var i=0;i<cats.length;i++){if(MB[cats[i]])parts.push(MB[cats[i]].n);}
  for(var i=0;i<(MB.extras||[]).length;i++)parts.push(MB.extras[i].n);
  var tcal=0,tp=0,tc=0,tf=0;
  for(var i=0;i<cats.length;i++){var k=cats[i];if(MB[k]){tcal+=MB[k].cal;tp+=MB[k].p;tc+=MB[k].c;tf+=MB[k].f;}}
  for(var i=0;i<(MB.extras||[]).length;i++){var x=MB.extras[i];tcal+=x.cal;tp+=x.p;tc+=x.c;tf+=x.f;}
  var name=parts.slice(0,3).join(' + ')+(parts.length>3?' + more':'');
  addItem(sec,{n:name,name:name,cal:tcal,p:tp,c:tc,f:tf,e:'🥣',id:Date.now()});
  clearMB();foodMode='log';renderFood();
}

// ── WEIGHT ────────────────────────────────────────────────────
function renderWeight(){
  var el=document.getElementById('t-weight');
  var entries=[];var _wk=Object.keys(W).sort().reverse();for(var _wi=0;_wi<_wk.length;_wi++)entries.push([_wk[_wi],W[_wk[_wi]]]);
  var pts=[];var _pk=Object.keys(W).sort();for(var _pi=0;_pi<_pk.length;_pi++)pts.push([_pk[_pi],W[_pk[_pi]]]);pts=pts.slice(-14);
  var chart='';
  if(pts.length>=2){
    var vals=pts.map(function(e){return e[1];});
    var mn=Math.min.apply(null,vals)-1;
    var mx=Math.max.apply(null,vals)+1;
    var rng=mx-mn||1;
    var cW=220,cH=60;
    var px=function(i){return(i/(pts.length-1))*cW;};
    var py=function(v){return cH-((v-mn)/rng)*cH;};
    var path=pts.map(function(p,i){return(i===0?'M':'L')+px(i).toFixed(1)+','+py(p[1]).toFixed(1);}).join(' ');
    chart='<div class="card csk" style="margin-bottom:11px;"><span class="lbl sk">TREND</span>'
      +'<svg viewBox="-10 -5 240 72" style="width:100%;height:72px;">'
      +'<path d="'+path+'" fill="none" stroke="#2a7aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
      +pts.map(function(p,i){return'<circle cx="'+px(i).toFixed(1)+'" cy="'+py(p[1]).toFixed(1)+'" r="3" fill="#2a7aaa"/>';}).join('')
      +'<text x="0" y="70" fill="#a89880" font-size="7" font-family="DM Sans,sans-serif">'+pts[0][0].slice(5)+'</text>'
      +'<text x="220" y="70" text-anchor="end" fill="#a89880" font-size="7" font-family="DM Sans,sans-serif">'+pts[pts.length-1][0].slice(5)+'</text>'
      +'</svg></div>';
  }
  el.innerHTML='<div class="card" style="margin-bottom:11px;"><span class="lbl g">LOG WEIGHT</span>'
    +'<div style="display:flex;gap:8px;">'
    +'<input class="inp" id="wi" type="number" step="0.1" placeholder="Weight in lbs" style="flex:1;">'
    +'<div class="btn sm" onclick="logW(document.getElementById(\'wi\').value)">+ Log</div>'
    +'</div><div style="font-size:10px;color:var(--fa);margin-top:4px;">For: '+selD+'</div></div>'
    +chart
    +'<div class="card"><span class="lbl">HISTORY</span>'
    +(entries.length?entries.slice(0,10).map(function(e){
      return '<div class="frow"><span style="font-size:13px;">'+e[0]+'</span>'
        +'<div style="display:flex;align-items:center;gap:10px;">'
        +'<span style="font-family:Playfair Display,serif;font-size:17px;font-weight:900;">'+e[1]+' lbs</span>'
        +'<div class="rmb" onclick="rmW(\''+e[0]+'\')">×</div></div></div>';
    }).join(''):'<div style="color:var(--fa);font-size:13px;text-align:center;padding:8px;">No weight entries yet</div>')
    +'</div>';
}

// ── STATS ─────────────────────────────────────────────────────
function renderStats(){
  var el=document.getElementById('t-stats');
  var last7=[];
  for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()-6+i);last7.push(d.toISOString().split('T')[0]);}
  var CAL=S.cal||2000,PRO=S.pro||170;

  var calBars=last7.map(function(d){
    var day=L[d]||{};
    var foods=[].concat(day.breakfast||[],day.lunch||[],day.dinner||[],day.snacks||[]);
    var cal=foods.reduce(function(a,f){return a+f.cal;},0);
    return{d:d,cal:cal,pct:Math.min(100,Math.round(cal/CAL*100))};
  });
  var proBars=last7.map(function(d){
    var day=L[d]||{};
    var foods=[].concat(day.breakfast||[],day.lunch||[],day.dinner||[],day.snacks||[]);
    var pro=foods.reduce(function(a,f){return a+(f.p||0);},0);
    return{d:d,pro:pro,pct:Math.min(100,Math.round(pro/PRO*100))};
  });

  var streak=0;
  var sd=new Date();
  for(var i=0;i<365;i++){
    var k=sd.toISOString().split('T')[0];
    var dl=L[k]||{};
    if((dl.workouts||[]).length>0){streak++;sd.setDate(sd.getDate()-1);}else{break;}
  }

  var bmr=BM.sx==='male'?10*(curW()/2.205)+6.25*(BM.h*2.54)-5*BM.a+5:10*(curW()/2.205)+6.25*(BM.h*2.54)-5*BM.a-161;
  var tdee=Math.round(bmr*1.55);
  var def=tdee-(S.cal||2000);
  var pace=(def*7/3500).toFixed(2);

  el.innerHTML='<div class="g2">'
    +'<div class="card cg" style="padding:13px;"><span class="lbl g">STREAK</span><div class="bnum">'+streak+'</div><div style="font-size:11px;color:var(--mu);">days in a row</div></div>'
    +'<div class="card cgd" style="padding:13px;"><span class="lbl gd">PROGRESS</span><div class="bnum">'+prog().toFixed(0)+'%</div><div style="font-size:11px;color:var(--mu);">to goal</div></div>'
    +'</div>'
    +'<div class="card" style="margin-bottom:11px;"><span class="lbl sk">7-DAY CALORIES</span>'
    +'<div style="display:flex;align-items:flex-end;gap:3px;height:56px;margin-bottom:4px;">'
    +calBars.map(function(b){return'<div style="flex:1;height:'+Math.max(3,b.pct*.5)+'px;background:'+(b.d===selD?'var(--go)':'#f0c870')+';border-radius:3px 3px 0 0;transition:height .6s;"></div>';}).join('')
    +'</div><div style="display:flex;gap:3px;">'
    +last7.map(function(d){return'<div style="flex:1;text-align:center;font-size:7px;color:var(--fa);">'+d.slice(8)+'</div>';}).join('')
    +'</div></div>'
    +'<div class="card" style="margin-bottom:11px;"><span class="lbl g">7-DAY PROTEIN</span>'
    +'<div style="display:flex;align-items:flex-end;gap:3px;height:56px;margin-bottom:4px;">'
    +proBars.map(function(b){return'<div style="flex:1;height:'+Math.max(3,b.pct*.5)+'px;background:'+(b.d===selD?'var(--fl)':'var(--sl)')+';border-radius:3px 3px 0 0;transition:height .6s;"></div>';}).join('')
    +'</div><div style="display:flex;gap:3px;">'
    +last7.map(function(d){return'<div style="flex:1;text-align:center;font-size:7px;color:var(--fa);">'+d.slice(8)+'</div>';}).join('')
    +'</div></div>'
    +'<div class="card" style="margin-bottom:11px;"><span class="lbl">BODY METRICS</span>'
    +'<div class="g2"><input class="inp" id="bh" type="number" value="'+BM.h+'" placeholder="Height (in)"><input class="inp" id="ba" type="number" value="'+BM.a+'" placeholder="Age"></div>'
    +'<select class="inp" id="bsx" style="margin-bottom:10px;"><option value="male"'+(BM.sx==='male'?' selected':'')+'>Male</option><option value="female"'+(BM.sx==='female'?' selected':'')+'>Female</option></select>'
    +'<div class="btn sm" onclick="saveBM(document.getElementById(\'bh\').value,document.getElementById(\'ba\').value,document.getElementById(\'bsx\').value)">Update</div>'
    +'<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">'
    +'<div class="card" style="flex:1;min-width:80px;padding:11px;text-align:center;"><div style="font-family:Playfair Display,serif;font-size:20px;font-weight:900;">'+Math.round(bmr)+'</div><div style="font-size:9px;color:var(--mu);">BMR</div></div>'
    +'<div class="card" style="flex:1;min-width:80px;padding:11px;text-align:center;"><div style="font-family:Playfair Display,serif;font-size:20px;font-weight:900;">'+tdee+'</div><div style="font-size:9px;color:var(--mu);">TDEE</div></div>'
    +'<div class="card" style="flex:1;min-width:80px;padding:11px;text-align:center;"><div style="font-family:Playfair Display,serif;font-size:20px;font-weight:900;color:'+(def>0?'var(--fl)':'var(--co)')+';">'+Math.abs(def)+'</div><div style="font-size:9px;color:var(--mu);">Deficit</div></div>'
    +'</div>'
    +'<div class="card cgd" style="padding:13px;text-align:center;margin-top:4px;"><div style="font-size:10px;color:var(--mu);margin-bottom:3px;">Projected fat loss</div><div style="font-family:Playfair Display,serif;font-size:26px;font-weight:900;color:var(--go);">'+pace+' lbs/wk</div></div>'
    +'</div>';
}
