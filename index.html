<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --cr:#faf8f3;--s1:#f0ede6;--s2:#e2ddd4;
  --fo:#1a3a2a;--fm:#2d5a3d;--fl:#4a8a5d;--sa:#7aaa8a;--sl:#b8d4c0;--sp:#e8f4ec;
  --go:#c8882a;--gp:#fdf5e4;--co:#d45a3a;--sk:#2a7aaa;--skp:#e4f2fb;
  --tx:#1a1510;--t2:#3d3020;--mu:#7a6a55;--fa:#a89880;
}
html,body{background:#faf8f3;color:#1a1510;font-family:'DM Sans',sans-serif;}
body{padding-bottom:80px;}
.hdr{background:linear-gradient(135deg,#1a3a2a,#2d5a3d);padding:24px 18px 0;position:relative;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7aaa8a,#c8882a,#7aaa8a);}
.htop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.hlb{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:4px;font-family:'Space Grotesk',sans-serif;margin-bottom:4px;}
.hwt{font-family:'Playfair Display',serif;font-size:42px;font-weight:900;color:#fff;line-height:1;}
.hwts{font-size:14px;font-weight:400;color:rgba(255,255,255,.5);margin-left:2px;font-family:'DM Sans',sans-serif;}
.hsb{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px;}
.hpill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:10px 14px;text-align:right;}
.hpl{font-size:8px;font-weight:700;letter-spacing:2px;color:#b8d4c0;font-family:'Space Grotesk',sans-serif;}
.hpv{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:#fff;}
.hpd{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px;}
.pbar{height:5px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden;margin-bottom:13px;}
.pfil{height:100%;border-radius:999px;background:linear-gradient(90deg,#7aaa8a,#c8882a);}
.hrow{display:flex;gap:8px;align-items:center;padding-bottom:14px;}
.dpil{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:9px;color:#fff;padding:7px 11px;font-size:12px;font-family:'DM Sans',sans-serif;}
.tbtn{background:rgba(122,170,138,.3);border:1px solid rgba(122,170,138,.5);border-radius:9px;color:#b8d4c0;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.nav{position:fixed;bottom:0;left:0;width:100%;background:rgba(255,255,255,.97);border-top:1px solid #e2ddd4;padding:6px 2px 18px;display:flex;z-index:100;}
.nb{flex:1;padding:6px 2px;background:none;border:none;color:#a89880;font-size:6px;letter-spacing:.8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px;text-transform:uppercase;border-radius:10px;}
.nb.on{color:#4a8a5d;}
.nb .ic{font-size:18px;}
.tab{display:none;padding:18px 16px 20px;}
.tab.on{display:block;}
.card{background:#fff;border-radius:16px;padding:16px;border:1px solid #e2ddd4;margin-bottom:11px;box-shadow:0 2px 12px rgba(26,20,10,.08);}
.cg{border-left:4px solid #4a8a5d;background:linear-gradient(135deg,#e8f4ec,#fff);}
.cgd{border-left:4px solid #c8882a;background:linear-gradient(135deg,#fdf5e4,#fff);}
.csk{border-left:4px solid #2a7aaa;background:linear-gradient(135deg,#e4f2fb,#fff);}
.lbl{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#7a6a55;display:block;margin-bottom:8px;}
.lbl.g{color:#4a8a5d;}.lbl.gd{color:#c8882a;}.lbl.sk{color:#2a7aaa;}
.bnum{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:#1a1510;}
.inp{background:#f0ede6;border:1.5px solid #e2ddd4;border-radius:11px;padding:11px 13px;color:#1a1510;font-size:14px;width:100%;font-family:'DM Sans',sans-serif;-webkit-appearance:none;}
.inp:focus{outline:none;border-color:#4a8a5d;}
.btn{background:linear-gradient(135deg,#2d5a3d,#1a3a2a);border:none;border-radius:11px;color:#fff;padding:11px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn.gd{background:linear-gradient(135deg,#e0a040,#c8882a);}
.btn.sk{background:linear-gradient(135deg,#3a9acc,#2a7aaa);}
.btn.gh{background:#f0ede6;color:#3d3020;border:1.5px solid #e2ddd4;}
.btn.sm{padding:8px 12px;font-size:12px;border-radius:9px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px;}
.seg{display:flex;background:#f0ede6;border-radius:12px;padding:3px;margin-bottom:14px;border:1px solid #e2ddd4;}
.sb{flex:1;padding:9px 3px;background:none;border:none;border-radius:9px;color:#7a6a55;font-size:9px;letter-spacing:1.5px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;text-transform:uppercase;}
.sb.on{background:#fff;color:#1a3a2a;box-shadow:0 2px 6px rgba(0,0,0,.08);}
.frow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0ede6;}
.frow:last-child{border-bottom:none;}
.mitem{background:#f0ede6;border-radius:10px;padding:9px 12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.sr{background:#fff;border:1.5px solid #e2ddd4;border-radius:12px;margin-top:5px;max-height:260px;overflow-y:auto;box-shadow:0 8px 32px rgba(26,20,10,.14);display:none;position:relative;z-index:50;}
.sri{padding:11px 14px;cursor:pointer;border-bottom:1px solid #f0ede6;display:flex;justify-content:space-between;align-items:center;}
.sri:last-child{border-bottom:none;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.chip{padding:7px 12px;border-radius:999px;border:1.5px solid #e2ddd4;background:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:#3d3020;}
.ri{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0ede6;}
.tgl{width:44px;height:24px;background:#e2ddd4;border-radius:999px;position:relative;cursor:pointer;border:none;flex-shrink:0;}
.tgl.on{background:#4a8a5d;}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tgl.on::after{transform:translateX(20px);}
.rings{display:flex;justify-content:space-around;padding:6px 0 2px;}
.aitip{background:linear-gradient(135deg,#f5f2ff,#f0f8ff);border:1.5px solid rgba(122,100,200,.2);border-radius:16px;padding:14px;margin-bottom:11px;}
.rmb{background:none;border:none;color:#a89880;cursor:pointer;font-size:20px;padding:0 4px;}
.prb{background:linear-gradient(135deg,#c8882a,#a06820);color:#fff;font-size:8px;font-weight:800;padding:3px 7px;border-radius:5px;letter-spacing:1px;font-family:'Space Grotesk',sans-serif;}
.cbox{background:#e8f4ec;border-radius:11px;padding:11px;border-left:3px solid #4a8a5d;margin-top:8px;}
@media(min-width:768px){
  body{padding-left:220px;padding-bottom:0;}
  .nav{left:0;top:0;bottom:0;width:220px;height:100vh;flex-direction:column;justify-content:flex-start;padding:24px 10px;border-top:none;border-right:1px solid #e2ddd4;gap:4px;overflow-y:auto;}
  .nb{flex:none;flex-direction:row;justify-content:flex-start;padding:11px 14px;font-size:10px;gap:10px;border-radius:11px;width:100%;}
  .tab{padding:22px 40px 20px;}
  .hdr{padding:28px 40px 0;}
}

<body>
<div class="hdr">
  <div class="htop">
    <div>
      <div class="hlb">FITTRACK</div>
      <div class="hwt" id="hw">180<span class="hwts">lbs</span></div>
      <div class="hsb" id="hs">Start: 180 lbs</div>
    </div>
    <div class="hpill">
      <div class="hpl">GOAL</div>
      <div class="hpv" id="hg">170</div>
      <div class="hpd" id="hd">-- days</div>
    </div>
  </div>
  <div class="pbar"><div class="pfil" id="hp" style="width:0%"></div></div>
  <div class="hrow">
    <input type="date" id="sd" class="dpil">
    <div class="tbtn" onclick="goToday()">TODAY</div>
  </div>
</div>
<div class="tab on" id="t-home"></div>
<div class="tab" id="t-food"></div>
<div class="tab" id="t-lift"></div>
<div class="tab" id="t-weight"></div>
<div class="tab" id="t-stats"></div>
<div class="tab" id="t-diet"></div>
<div class="tab" id="t-goals"></div>
<nav class="nav">
  <div class="nb on" id="nb-home" onclick="go('home')"><span class="ic">⚡</span><span>Home</span></div>
  <div class="nb" id="nb-food" onclick="go('food')"><span class="ic">🍽️</span><span>Food</span></div>
  <div class="nb" id="nb-lift" onclick="go('lift')"><span class="ic">💪</span><span>Lift</span></div>
  <div class="nb" id="nb-weight" onclick="go('weight')"><span class="ic">⚖️</span><span>Weight</span></div>
  <div class="nb" id="nb-stats" onclick="go('stats')"><span class="ic">📈</span><span>Stats</span></div>
  <div class="nb" id="nb-diet" onclick="go('diet')"><span class="ic">🌿</span><span>Diet</span></div>
  <div class="nb" id="nb-goals" onclick="go('goals')"><span class="ic">⚙️</span><span>Goals</span></div>
</nav>
<script>
// STORAGE
function sGet(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// DEFAULTS
var DEF_S={goalW:170,startW:180,goalD:‘2026-05-06’,startD:‘2026-03-03’,cal:2000,pro:170,wkGoal:4,name:‘Matthew’};
var DEF_RX={gluten:false,dairy:false,nuts:false,shellfish:false,eggs:false,soy:false,nightshades:false,vegetarian:false,vegan:false,custom:’’};

// STATE
var S=sGet(‘ft_s’,DEF_S);
var L=sGet(‘ft_l’,{});
var W=sGet(‘ft_w’,{});
var SC=sGet(‘ft_sc’,{});
var PR=sGet(‘ft_pr’,{});
var BM=sGet(‘ft_bm’,{h:70,a:30,sx:‘male’});
var RX=sGet(‘ft_rx’,DEF_RX);
var selD=new Date().toISOString().split(‘T’)[0];
var curTab=‘home’;
var foodMode=‘log’;
var wkMode=‘today’;
var MB={base:null,protein:null,veggie:null,fruit:null,extras:[]};
var chatHistory=[];

// HELPERS
function esc(s){return String(s).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’);}
function td(){return new Date().toISOString().split(‘T’)[0];}
function dow(){return new Date().getDay();}
function dlog(){return L[selD]||{breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};}
function allF(){var d=dlog();return [].concat(d.breakfast||[],d.lunch||[],d.dinner||[],d.snacks||[]);}
function tots(){
var f=allF();
var r={cal:0,p:0,c:0,fat:0};
for(var i=0;i<f.length;i++){r.cal+=f[i].cal||0;r.p+=f[i].p||0;r.c+=f[i].c||0;r.fat+=f[i].f||0;}
return r;
}
function curW(){
var keys=Object.keys(W).sort();
return keys.length ? W[keys[keys.length-1]] : (S.startW||180);
}
function prog(){
var sw=S.startW||180,gw=S.goalW||170,lost=sw-curW(),rng=Math.abs(sw-gw)||10;
return Math.min(100,Math.max(0,(lost/rng)*100));
}
function dLeft(){
var gd=new Date(S.goalD||‘2026-05-06’);
return Math.max(0,Math.round((gd-new Date())/864e5));
}
function goToday(){selD=td();document.getElementById(‘sd’).value=selD;render();}

// MUTATIONS
function addItem(sec,item){
if(!L[selD])L[selD]={breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};
if(!L[selD][sec])L[selD][sec]=[];
L[selD][sec].push(item);
sSet(‘ft_l’,L);render();
}
function rmItem(sec,id){
if(!L[selD]||!L[selD][sec])return;
var arr=L[selD][sec];
var out=[];
for(var i=0;i<arr.length;i++){if(arr[i].id!==id)out.push(arr[i]);}
L[selD][sec]=out;
sSet(‘ft_l’,L);render();
}
function addWk(n){
if(!n||!String(n).trim())return;
if(!L[selD])L[selD]={breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};
if(!L[selD].workouts)L[selD].workouts=[];
L[selD].workouts.push({name:String(n).trim(),id:Date.now()});
sSet(‘ft_l’,L);render();
}
function rmWk(id){
if(!L[selD]||!L[selD].workouts)return;
var arr=L[selD].workouts,out=[];
for(var i=0;i<arr.length;i++){if(arr[i].id!==id)out.push(arr[i]);}
L[selD].workouts=out;
sSet(‘ft_l’,L);render();
}
function logW(v){if(!v)return;W[selD]=parseFloat(v);sSet(‘ft_w’,W);render();}
function rmW(d){delete W[d];sSet(‘ft_w’,W);render();}
function savePR(ex,wt,rp){if(!ex||!wt||!rp)return;PR[ex]={weight:parseFloat(wt),reps:parseInt(rp),date:selD};sSet(‘ft_pr’,PR);render();}
function saveBM(h,a,sx){BM={h:parseFloat(h)||70,a:parseInt(a)||30,sx:sx||‘male’};sSet(‘ft_bm’,BM);render();}
function saveRX(k,v){RX[k]=v;sSet(‘ft_rx’,RX);render();}
function saveS(obj){for(var k in obj){S[k]=obj[k];}sSet(‘ft_s’,S);render();}

// NAV
function go(name){
var tabs=[‘home’,‘food’,‘lift’,‘weight’,‘stats’,‘diet’,‘goals’];
for(var i=0;i<tabs.length;i++){
var t=document.getElementById(‘t-’+tabs[i]);
var b=document.getElementById(‘nb-’+tabs[i]);
if(t)t.className=‘tab’;
if(b)b.className=‘nb’;
}
var at=document.getElementById(‘t-’+name);
var ab=document.getElementById(‘nb-’+name);
if(at)at.className=‘tab on’;
if(ab)ab.className=‘nb on’;
curTab=name;
renderTab(name);
}
function renderTab(n){
if(n===‘home’){rHome();}
else if(n===‘food’){rFood();}
else if(n===‘lift’){rLift();}
else if(n===‘weight’){rWeight();}
else if(n===‘stats’){rStats();}
else if(n===‘diet’){rDiet();}
else if(n===‘goals’){rGoals();}
}
function render(){rHdr();renderTab(curTab);}

// HEADER
function rHdr(){
var cw=curW(),sw=S.startW||180,lost=sw-cw;
var hel=document.getElementById(‘hw’);
if(hel)hel.innerHTML=cw+’<span class="hwts">lbs</span>’;
var sel=document.getElementById(‘hs’);
if(sel)sel.textContent=lost>0?‘Down ‘+lost.toFixed(1)+’ lbs’:‘Start: ‘+sw+’ lbs’;
var gel=document.getElementById(‘hg’);
if(gel)gel.textContent=S.goalW||170;
var del=document.getElementById(‘hd’);
if(del)del.textContent=dLeft()+‘d left’;
var pel=document.getElementById(‘hp’);
if(pel)pel.style.width=prog()+’%’;
}

function searchFood(q,max){
if(!max){max=12;}
if(!q||q.length<2){return [];}
var ql=q.toLowerCase();
var res=[];
for(var i=0;i<FDB.length;i++){
var f=FDB[i];
var nl=f.n.toLowerCase();
var s=0;
if(nl===ql){s=100;}
else if(nl.indexOf(ql)===0){s=80;}
else if(nl.indexOf(ql)>=0){s=60;}
if(s>0){res.push({f:f,s:s});}
}
res.sort(function(a,b){return b.s-a.s;});
var out=[];
for(var j=0;j<Math.min(max,res.length);j++){out.push(res[j].f);}
return out;
}

// RING HELPER
function ring(pct,color,label,val,unit,r){
if(!r){r=30;}
var circ=2*3.14159*r;
var off=circ-(pct/100)*circ;
var cx=r+7;
var cy=r+7;
var sz=(r*2+14);
return ‘<div style="display:flex;flex-direction:column;align-items:center;gap:4px;">’
+’<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'">’
+’<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#e8edf2" stroke-width="5"/>’
+’<circle cx=”’+cx+’” cy=”’+cy+’” r=”’+r+’” fill=“none” stroke=”’+color+’” stroke-width=“5” stroke-linecap=“round”’
+’ stroke-dasharray=”’+circ.toFixed(1)+’” stroke-dashoffset=”’+off.toFixed(1)+’”’
+’ transform=“rotate(-90 ‘+cx+’ ‘+cy+’)”/>’
+’<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" fill="#1a1510" font-size="10" font-family="Playfair Display,serif" font-weight="900">’+val+’</text>’
+’<text x="'+cx+'" y="'+(cy+8)+'" text-anchor="middle" fill="#7a6a55" font-size="6">’+unit+’</text>’
+’</svg>’
+’<div style="font-size:8px;font-family:Space Grotesk,sans-serif;font-weight:700;letter-spacing:2px;color:#7a6a55;text-transform:uppercase;">’+label+’</div>’
+’</div>’;
}

function toggleMB(cat,name,cal,p,c,f,e,isMulti){
var item={n:name,cal:+cal,p:+p,c:+c,f:+f,e:e};
if(isMulti){
if(!MB.extras){MB.extras=[];}
var idx=-1;
for(var i=0;i<MB.extras.length;i++){if(MB.extras[i].n===name){idx=i;break;}}
if(idx>=0){MB.extras.splice(idx,1);}else{MB.extras.push(item);}
}else{
if(MB[cat]&&MB[cat].n===name){MB[cat]=null;}else{MB[cat]=item;}
}
rFood();
}

function logMeal(){
var hr=new Date().getHours();
var sec=‘snacks’;
if(hr<11){sec=‘breakfast’;}else if(hr<15){sec=‘lunch’;}else if(hr<21){sec=‘dinner’;}
var parts=[];
var sk=[‘base’,‘protein’,‘veggie’,‘fruit’];
for(var i=0;i<sk.length;i++){if(MB[sk[i]]){parts.push(MB[sk[i]].n);}}
var ex=MB.extras||[];
for(var j=0;j<ex.length;j++){parts.push(ex[j].n);}
var tcal=0,tp=0,tc=0,tf=0;
for(var i=0;i<sk.length;i++){var k=sk[i];if(MB[k]){tcal+=MB[k].cal;tp+=MB[k].p;tc+=MB[k].c;tf+=MB[k].f;}}
for(var j=0;j<ex.length;j++){tcal+=ex[j].cal;tp+=ex[j].p;tc+=ex[j].c;tf+=ex[j].f;}
var name=parts.slice(0,3).join(’ + ‘)+(parts.length>3?’ +more’:’’);
addItem(sec,{n:name,name:name,cal:tcal,p:tp,c:tc,f:tf,e:‘🥣’,id:Date.now()});
clearMB();foodMode=‘log’;rFood();
}

function rWeight(){

// STATS TAB
function rStats(){
var el=document.getElementById(‘t-stats’);
if(!el){return;}
var last7=[];
for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()-6+i);last7.push(d.toISOString().split(‘T’)[0]);}
var CAL=S.cal||2000;
var PRO=S.pro||170;
var calBars=[];
var proBars=[];
for(var bi=0;bi<last7.length;bi++){
var dk=last7[bi];
var dl=L[dk]||{};
var foods=[].concat(dl.breakfast||[],dl.lunch||[],dl.dinner||[],dl.snacks||[]);
var dc=0,dp=0;
for(var fi=0;fi<foods.length;fi++){dc+=foods[fi].cal||0;dp+=foods[fi].p||0;}
calBars.push({d:dk,cal:dc,pct:Math.min(100,Math.round(dc/CAL*100))});
proBars.push({d:dk,pro:dp,pct:Math.min(100,Math.round(dp/PRO*100))});
}
var streak=0;
var sd=new Date();
for(var si=0;si<365;si++){
var sk=sd.toISOString().split(‘T’)[0];
var sdl=L[sk]||{};
if(sdl.workouts&&sdl.workouts.length>0){streak++;sd.setDate(sd.getDate()-1);}else{break;}
}
var cw=curW();
var bmr=0;
var w_kg=cw/2.205;
var h_cm=BM.h*2.54;
if(BM.sx===‘male’){bmr=10*w_kg+6.25*h_cm-5*BM.a+5;}
else{bmr=10*w_kg+6.25*h_cm-5*BM.a-161;}

}
html+=’</div><div style="display:flex;gap:3px;">’;
for(var li=0;li<last7.length;li++){html+=’<div style="flex:1;text-align:center;font-size:7px;color:#a89880;">’+last7[li].slice(8)+’</div>’;}
html+=’</div></div>’;
html+=’<div class="card" style="margin-bottom:11px;"><span class="lbl g">7-DAY PROTEIN</span>’
+’<div style="display:flex;align-items:flex-end;gap:3px;height:56px;margin-bottom:4px;">’;
for(var pbi=0;pbi<proBars.length;pbi++){
var pb=proBars[pbi];
html+=’<div style="flex:1;height:'+Math.max(3,pb.pct*0.5)+'px;background:'+(pb.d===selD?'#4a8a5d':'#b8d4c0')+';border-radius:3px 3px 0 0;"></div>’;
}
html+=’</div><div style="display:flex;gap:3px;">’;
for(var li2=0;li2<last7.length;li2++){html+=’<div style="flex:1;text-align:center;font-size:7px;color:#a89880;">’+last7[li2].slice(8)+’</div>’;}
html+=’</div></div>’;
html+=’<div class="card" style="margin-bottom:11px;"><span class="lbl">BODY METRICS</span>’
+’<div class="g2"><input class="inp" id="bh" type="number" value="'+BM.h+'" placeholder="Height (in)"><input class="inp" id="ba" type="number" value="'+BM.a+'" placeholder="Age"></div>’
+’<select class="inp" id="bsx" style="margin-bottom:10px;"><option value=“male”’+(BM.sx===‘male’?’ selected’:’’)+’>Male</option><option value=“female”’+(BM.sx===‘female’?’ selected’:’’)+’>Female</option></select>’
+’<div class="btn sm" onclick="saveBM(document.getElementById(\'bh\').value,document.getElementById(\'ba\').value,document.getElementById(\'bsx\').value)">Update</div>’
+’<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">’
+’<div class="card" style="flex:1;min-width:80px;padding:11px;text-align:center;margin-bottom:0;"><div style="font-family:Playfair Display,serif;font-size:20px;font-weight:900;">’+Math.round(bmr)+’</div><div style="font-size:9px;color:#7a6a55;">BMR</div></div>’

// AI CHAT
function quickQ(el){
var inp=document.getElementById(‘chat-inp’);
if(inp){inp.value=el.textContent;}
sendChat();
}
function sendChat(){
var inp=document.getElementById(‘chat-inp’);
if(!inp){return;}
var q=inp.value.trim();
if(!q){return;}
inp.value=’’;
var msgs=document.getElementById(‘chat-msgs’);
if(!msgs){return;}
var userDiv=document.createElement(‘div’);
userDiv.style.cssText=‘align-self:flex-end;background:linear-gradient(135deg,#7a64c8,#5a44a8);color:#fff;padding:9px 13px;border-radius:14px 14px 3px 14px;font-size:13px;max-width:85%;line-height:1.5;’;
userDiv.textContent=q;
msgs.appendChild(userDiv);
var typingDiv=document.createElement(‘div’);
typingDiv.id=‘chat-typing’;
typingDiv.style.cssText=‘align-self:flex-start;background:#fff;border:1px solid #e2ddd4;padding:9px 13px;border-radius:14px 14px 14px 3px;font-size:13px;color:#a89880;’;
typingDiv.textContent=‘Thinking…’;
msgs.appendChild(typingDiv);
msgs.scrollTop=msgs.scrollHeight;
chatHistory.push({role:‘user’,content:q});
var todayWk=SC[dow()]||’’;
var wkCtx=’’;
if(todayWk&&WKS[todayWk]){
var wk=WKS[todayWk];
wkCtx=‘Today is ‘+todayWk+’ (’+wk.focus+’). Exercises: ‘;
for(var i=0;i<wk.ex.length;i++){wkCtx+=(i>0?’, ‘:’’)+wk.ex[i].name+’ ‘+wk.ex[i].sets;}
}
var sys=‘You are a personal trainer and fitness coach inside a workout app called FitTrack. Answer questions clearly and concisely, 2 to 4 sentences. Be encouraging but direct. Use plain language.’+(wkCtx?’ Context: ‘+wkCtx:’’);
fetch(‘https://api.anthropic.com/v1/messages’,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’},
body:JSON.stringify({model:‘claude-sonnet-4-20250514’,max_tokens:1000,system:sys,messages:chatHistory})
}).then(function(r){return r.json();}).then(function(data){
var reply=‘Sorry, something went wrong.’;
if(data&&data.content&&data.content[0]&&data.content[0].text){reply=data.content[0].text;}
chatHistory.push({role:‘assistant’,content:reply});
var typing=document.getElementById(‘chat-typing’);
if(typing){
typing.id=’’;
typing.style.cssText=‘align-self:flex-start;background:#fff;border:1px solid #e2ddd4;padding:9px 13px;border-radius:14px 14px 14px 3px;font-size:13px;color:#1a1510;max-width:90%;line-height:1.6;white-space:pre-wrap;’;
typing.textContent=reply;
}
msgs.scrollTop=msgs.scrollHeight;
}).catch(function(){
var typing=document.getElementById(‘chat-typing’);
if(typing){typing.textContent=‘Connection error. Try again.’;}
});
}
