<!DOCTYPE html>

<html lang="en">

<title>FitTrack</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:#faf8f3;color:#1a1510;font-family:'DM Sans',sans-serif;}
body{padding-bottom:80px;}
.hdr{background:linear-gradient(135deg,#1a3a2a,#2d5a3d);padding:24px 18px 0;position:relative;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7aaa8a,#c8882a,#7aaa8a);}
.htop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.hlb{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:4px;font-family:'Space Grotesk',sans-serif;margin-bottom:4px;}
.hwt{font-family:'Playfair Display',serif;font-size:42px;font-weight:900;color:#fff;line-height:1;}
.hwts{font-size:14px;font-weight:400;color:rgba(255,255,255,.5);margin-left:2px;font-family:'DM Sans',sans-serif;}
.hsb{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px;}
.hpill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:10px 14px;text-align:right;}
.hpl{font-size:8px;font-weight:700;letter-spacing:2px;color:#b8d4c0;font-family:'Space Grotesk',sans-serif;}
.hpv{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:#fff;}
.hpd{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px;}
.pbar{height:5px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden;margin-bottom:13px;}
.pfil{height:100%;border-radius:999px;background:linear-gradient(90deg,#7aaa8a,#c8882a);}
.hrow{display:flex;gap:8px;align-items:center;padding-bottom:14px;}
.dpil{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:9px;color:#fff;padding:7px 11px;font-size:12px;font-family:'DM Sans',sans-serif;}
.tbtn{background:rgba(122,170,138,.3);border:1px solid rgba(122,170,138,.5);border-radius:9px;color:#b8d4c0;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.nav{position:fixed;bottom:0;left:0;width:100%;background:rgba(255,255,255,.97);border-top:1px solid #e2ddd4;padding:6px 2px 18px;display:flex;z-index:100;}
.nb{flex:1;padding:6px 2px;background:none;border:none;color:#a89880;font-size:6px;letter-spacing:.8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px;text-transform:uppercase;border-radius:10px;}
.nb.on{color:#4a8a5d;}
.nb .ic{font-size:18px;}
.tab{display:none;padding:18px 16px 20px;}
.tab.on{display:block;}
.card{background:#fff;border-radius:16px;padding:16px;border:1px solid #e2ddd4;margin-bottom:11px;box-shadow:0 2px 12px rgba(26,20,10,.08);}
.cg{border-left:4px solid #4a8a5d;background:linear-gradient(135deg,#e8f4ec,#fff);}
.cgd{border-left:4px solid #c8882a;background:linear-gradient(135deg,#fdf5e4,#fff);}
.csk{border-left:4px solid #2a7aaa;background:linear-gradient(135deg,#e4f2fb,#fff);}
.lbl{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#7a6a55;display:block;margin-bottom:8px;}
.lbl.g{color:#4a8a5d;}.lbl.gd{color:#c8882a;}.lbl.sk{color:#2a7aaa;}
.bnum{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:#1a1510;}
.inp{background:#f0ede6;border:1.5px solid #e2ddd4;border-radius:11px;padding:11px 13px;color:#1a1510;font-size:14px;width:100%;font-family:'DM Sans',sans-serif;-webkit-appearance:none;}
.inp:focus{outline:none;border-color:#4a8a5d;}
.btn{background:linear-gradient(135deg,#2d5a3d,#1a3a2a);border:none;border-radius:11px;color:#fff;padding:11px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn.gd{background:linear-gradient(135deg,#e0a040,#c8882a);}
.btn.sk{background:linear-gradient(135deg,#3a9acc,#2a7aaa);}
.btn.gh{background:#f0ede6;color:#3d3020;border:1.5px solid #e2ddd4;}
.btn.sm{padding:8px 12px;font-size:12px;border-radius:9px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px;}
.seg{display:flex;background:#f0ede6;border-radius:12px;padding:3px;margin-bottom:14px;border:1px solid #e2ddd4;}
.sb{flex:1;padding:9px 3px;background:none;border:none;border-radius:9px;color:#7a6a55;font-size:9px;letter-spacing:1.5px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;text-transform:uppercase;}
.sb.on{background:#fff;color:#1a3a2a;box-shadow:0 2px 6px rgba(0,0,0,.08);}
.frow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0ede6;}
.frow:last-child{border-bottom:none;}
.mitem{background:#f0ede6;border-radius:10px;padding:9px 12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.sr{background:#fff;border:1.5px solid #e2ddd4;border-radius:12px;margin-top:5px;max-height:260px;overflow-y:auto;box-shadow:0 8px 32px rgba(26,20,10,.14);display:none;position:relative;z-index:50;}
.sri{padding:11px 14px;cursor:pointer;border-bottom:1px solid #f0ede6;display:flex;justify-content:space-between;align-items:center;}
.sri:last-child{border-bottom:none;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.chip{padding:7px 12px;border-radius:999px;border:1.5px solid #e2ddd4;background:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:#3d3020;}
.ri{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0ede6;}
.tgl{width:44px;height:24px;background:#e2ddd4;border-radius:999px;position:relative;cursor:pointer;border:none;flex-shrink:0;}
.tgl.on{background:#4a8a5d;}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tgl.on::after{transform:translateX(20px);}
.rings{display:flex;justify-content:space-around;padding:6px 0 2px;}
.aitip{background:linear-gradient(135deg,#f5f2ff,#f0f8ff);border:1.5px solid rgba(122,100,200,.2);border-radius:16px;padding:14px;margin-bottom:11px;}
.rmb{background:none;border:none;color:#a89880;cursor:pointer;font-size:20px;padding:0 4px;}
.prb{background:linear-gradient(135deg,#c8882a,#a06820);color:#fff;font-size:8px;font-weight:800;padding:3px 7px;border-radius:5px;letter-spacing:1px;font-family:'Space Grotesk',sans-serif;}
.cbox{background:#e8f4ec;border-radius:11px;padding:11px;border-left:3px solid #4a8a5d;margin-top:8px;}
@media(min-width:768px){
  body{padding-left:220px;padding-bottom:0;}
  .nav{left:0;top:0;bottom:0;width:220px;height:100vh;flex-direction:column;justify-content:flex-start;padding:24px 10px;border-top:none;border-right:1px solid #e2ddd4;gap:4px;overflow-y:auto;}
  .nb{flex:none;flex-direction:row;justify-content:flex-start;padding:11px 14px;font-size:10px;gap:10px;border-radius:11px;width:100%;}
  .tab{padding:22px 40px 20px;}
  .hdr{padding:28px 40px 0;}
}
</style>

  <div class="nb" id="nb-lift" onclick="go('lift')"><span class="ic">&#128170;</span><span>Lift</span></div>
  <div class="nb" id="nb-weight" onclick="go('weight')"><span class="ic">&#9878;</span><span>Weight</span></div>
  <div class="nb" id="nb-stats" onclick="go('stats')"><span class="ic">&#128200;</span><span>Stats</span></div>
  <div class="nb" id="nb-diet" onclick="go('diet')"><span class="ic">&#127807;</span><span>Diet</span></div>

<script>
// STORAGE
function sGet(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// DEFAULTS
var DEF_S={goalW:170,startW:180,goalD:тАШ2026-05-06тАЩ,startD:тАШ2026-03-03тАЩ,cal:2000,pro:170,wkGoal:4,name:тАШMatthewтАЩ};
var DEF_RX={gluten:false,dairy:false,nuts:false,shellfish:false,eggs:false,soy:false,nightshades:false,vegetarian:false,vegan:false,custom:тАЩтАЩ};

// STATE
var S=sGet(тАШft_sтАЩ,DEF_S);
var L=sGet(тАШft_lтАЩ,{});
var W=sGet(тАШft_wтАЩ,{});
var SC=sGet(тАШft_scтАЩ,{});
var PR=sGet(тАШft_prтАЩ,{});
var BM=sGet(тАШft_bmтАЩ,{h:70,a:30,sx:тАШmaleтАЩ});
var RX=sGet(тАШft_rxтАЩ,DEF_RX);
var selD=new Date().toISOString().split(тАШTтАЩ)[0];
var curTab=тАШhomeтАЩ;
var foodMode=тАШlogтАЩ;
var wkMode=тАШtodayтАЩ;
var MB={base:null,protein:null,veggie:null,fruit:null,extras:[]};
var chatHistory=[];

// HELPERS
function esc(s){return String(s).replace(/&/g,тАЩ&тАЩ).replace(/</g,тАЩ<тАЩ).replace(/>/g,тАЩ>тАЩ);}
function td(){return new Date().toISOString().split(тАШTтАЩ)[0];}
function dow(){return new Date().getDay();}
function dlog(){return L[selD]||{breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};}
function allF(){var d=dlog();return [].concat(d.breakfast||[],d.lunch||[],d.dinner||[],d.snacks||[]);}
function tots(){
var f=allF();
var r={cal:0,p:0,c:0,fat:0};
for(var i=0;i<f.length;i++){r.cal+=f[i].cal||0;r.p+=f[i].p||0;r.c+=f[i].c||0;r.fat+=f[i].f||0;}
return r;
}
function curW(){
var keys=Object.keys(W).sort();
return keys.length ? W[keys[keys.length-1]] : (S.startW||180);
}
function prog(){
var sw=S.startW||180,gw=S.goalW||170,lost=sw-curW(),rng=Math.abs(sw-gw)||10;
return Math.min(100,Math.max(0,(lost/rng)*100));
}
function dLeft(){
var gd=new Date(S.goalD||тАШ2026-05-06тАЩ);
return Math.max(0,Math.round((gd-new Date())/864e5));
}
function goToday(){selD=td();document.getElementById(тАШsdтАЩ).value=selD;render();}

// MUTATIONS
function addItem(sec,item){
if(!L[selD])L[selD]={breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};
if(!L[selD][sec])L[selD][sec]=[];
L[selD][sec].push(item);
sSet(тАШft_lтАЩ,L);render();
}
function rmItem(sec,id){
if(!L[selD]||!L[selD][sec])return;
var arr=L[selD][sec];
var out=[];
for(var i=0;i<arr.length;i++){if(arr[i].id!==id)out.push(arr[i]);}
L[selD][sec]=out;
sSet(тАШft_lтАЩ,L);render();
}
function addWk(n){
if(!n||!String(n).trim())return;
if(!L[selD])L[selD]={breakfast:[],lunch:[],dinner:[],snacks:[],workouts:[]};
if(!L[selD].workouts)L[selD].workouts=[];
L[selD].workouts.push({name:String(n).trim(),id:Date.now()});
sSet(тАШft_lтАЩ,L);render();
}
function rmWk(id){
if(!L[selD]||!L[selD].workouts)return;
var arr=L[selD].workouts,out=[];
for(var i=0;i<arr.length;i++){if(arr[i].id!==id)out.push(arr[i]);}
L[selD].workouts=out;
sSet(тАШft_lтАЩ,L);render();
}
function logW(v){if(!v)return;W[selD]=parseFloat(v);sSet(тАШft_wтАЩ,W);render();}
function rmW(d){delete W[d];sSet(тАШft_wтАЩ,W);render();}
function savePR(ex,wt,rp){if(!ex||!wt||!rp)return;PR[ex]={weight:parseFloat(wt),reps:parseInt(rp),date:selD};sSet(тАШft_prтАЩ,PR);render();}
function saveBM(h,a,sx){BM={h:parseFloat(h)||70,a:parseInt(a)||30,sx:sx||тАШmaleтАЩ};sSet(тАШft_bmтАЩ,BM);render();}
function saveRX(k,v){RX[k]=v;sSet(тАШft_rxтАЩ,RX);render();}
function saveS(obj){for(var k in obj){S[k]=obj[k];}sSet(тАШft_sтАЩ,S);render();}

// NAV
function go(name){
var tabs=[тАШhomeтАЩ,тАШfoodтАЩ,тАШliftтАЩ,тАШweightтАЩ,тАШstatsтАЩ,тАШdietтАЩ,тАШgoalsтАЩ];
for(var i=0;i<tabs.length;i++){
var t=document.getElementById(тАШt-тАЩ+tabs[i]);
var b=document.getElementById(тАШnb-тАЩ+tabs[i]);
if(t)t.className=тАШtabтАЩ;
if(b)b.className=тАШnbтАЩ;
}
var at=document.getElementById(тАШt-тАЩ+name);
var ab=document.getElementById(тАШnb-тАЩ+name);
if(at)at.className=тАШtab onтАЩ;
if(ab)ab.className=тАШnb onтАЩ;
curTab=name;
renderTab(name);
}
function renderTab(n){
if(n===тАШhomeтАЩ){rHome();}
else if(n===тАШfoodтАЩ){rFood();}
else if(n===тАШliftтАЩ){rLift();}
else if(n===тАШweightтАЩ){rWeight();}
else if(n===тАШstatsтАЩ){rStats();}
else if(n===тАШdietтАЩ){rDiet();}
else if(n===тАШgoalsтАЩ){rGoals();}
}
function render(){rHdr();renderTab(curTab);}

// HEADER
function rHdr(){
var cw=curW(),sw=S.startW||180,lost=sw-cw;
var hel=document.getElementById(тАШhwтАЩ);
if(hel)hel.innerHTML=cw+тАЩ<span class="hwts">lbs</span>тАЩ;
var sel=document.getElementById(тАШhsтАЩ);
if(sel)sel.textContent=lost>0?тАШDown тАШ+lost.toFixed(1)+тАЩ lbsтАЩ:тАШStart: тАШ+sw+тАЩ lbsтАЩ;
var gel=document.getElementById(тАШhgтАЩ);
if(gel)gel.textContent=S.goalW||170;
var del=document.getElementById(тАШhdтАЩ);
if(del)del.textContent=dLeft()+тАШd leftтАЩ;
var pel=document.getElementById(тАШhpтАЩ);
if(pel)pel.style.width=prog()+тАЩ%тАЩ;
}

function searchFood(q,max){
if(!max){max=12;}
if(!q||q.length<2){return [];}
var ql=q.toLowerCase();
var res=[];
for(var i=0;i<FDB.length;i++){
var f=FDB[i];
var nl=f.n.toLowerCase();
var s=0;
if(nl===ql){s=100;}
else if(nl.indexOf(ql)===0){s=80;}
else if(nl.indexOf(ql)>=0){s=60;}
if(s>0){res.push({f:f,s:s});}
}
res.sort(function(a,b){return b.s-a.s;});
var out=[];
for(var j=0;j<Math.min(max,res.length);j++){out.push(res[j].f);}
return out;
}
